<!DOCTYPE html>
<html>
<head>
  <title>Login - MockArena</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0d0d0d;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-box {
      background: #1a1a1a;
      padding: 30px;
      border-radius: 10px;
      width: 300px;
      text-align: center;
    }

    h2 {
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: none;
      border-radius: 5px;
    }

    button {
      width: 100%;
      padding: 10px;
      background: orange;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: darkorange;
    }
  </style>
</head>

<body>

  <div class="login-box">
    <h2>Login to MockArena</h2>

    <input type="text" placeholder="Enter Email">
    <input type="password" placeholder="Enter Password">

    <button onclick="loginUser()">Login</button>
  </div>
<script>
function loginUser() {
    let email = document.querySelector('input[type="text"]').value;
    let password = document.querySelector('input[type="password"]').value;

    if (email && password) {
        localStorage.setItem("user", email);
        window.location.href = "dashboard.html";
    } else {
        alert("Please enter details");
    }
}
</script>
</body>
</html>
