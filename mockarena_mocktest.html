<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MockArena — JEE Advanced Full Mock #15</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=IBM+Plex+Mono:wght@300;400;500&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#faf9f5;--cream-warm:#f5f3ec;--cream-card:#ffffff;
  --forest:#1a2618;--forest-soft:#243422;--forest-muted:#3d5239;
  --sage:#6b8f5e;--sage-light:rgba(107,143,94,0.1);--sage-glow:rgba(107,143,94,0.22);
  --gold:#c8962a;--gold-dim:rgba(200,150,42,0.09);
  --rose:#c84b4b;--rose-light:rgba(200,75,75,0.09);
  --sky:#3b82c4;--sky-light:rgba(59,130,196,0.09);
  --amber:#b87333;--amber-light:rgba(184,115,51,0.09);
  --purple:#7c5cbf;--purple-light:rgba(124,92,191,0.09);
  --border:rgba(26,38,24,0.08);--border-med:rgba(26,38,24,0.13);--border-strong:rgba(26,38,24,0.2);
  --font-d:'Outfit',sans-serif;--font-b:'Outfit',sans-serif;--font-m:'IBM Plex Mono',monospace;--font-s:'Lora',serif;
  --sh:0 1px 3px rgba(26,38,24,0.06),0 4px 16px rgba(26,38,24,0.04);
  --sh-hover:0 8px 32px rgba(107,143,94,0.15),0 2px 8px rgba(26,38,24,0.06);
  --sh-deep:0 20px 60px rgba(26,38,24,0.12);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
@media(max-width:860px){html{height:auto!important;overflow-x:hidden!important;overflow-y:auto!important;}body{height:auto!important;overflow-x:hidden!important;overflow-y:auto!important;}}
body{font-family:var(--font-b);background:var(--cream);color:var(--forest);-webkit-font-smoothing:antialiased;}

/* ═══ TOP BAR ═══ */
.topbar{height:56px;background:var(--forest);display:flex;align-items:center;padding:0 20px;gap:16px;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,.06);position:relative;z-index:100;}
.tb-logo{display:flex;align-items:center;gap:8px;text-decoration:none;}
.tb-lm{width:30px;height:30px;background:linear-gradient(135deg,var(--sage),#4a7a3d);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:800;color:white;flex-shrink:0;}
.tb-brand{font-family:var(--font-d);font-size:.9rem;font-weight:900;}
.tb-mock{color:white;}
.tb-arena{background:linear-gradient(135deg,#818cf8,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.tb-test-name{font-size:.78rem;font-weight:600;color:rgba(255,255,255,.5);display:flex;align-items:center;gap:6px;}
.tb-test-name::before{content:'';width:1px;height:16px;background:rgba(255,255,255,.15);}
.tb-center{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;}

/* Subject tabs in topbar */
.subj-tabs{display:flex;gap:4px;background:rgba(255,255,255,.06);border-radius:10px;padding:3px;}
.subj-tab{font-family:var(--font-d);font-size:.72rem;font-weight:600;padding:5px 14px;border-radius:8px;border:none;cursor:pointer;transition:all .2s;color:rgba(255,255,255,.45);background:none;}
.subj-tab:hover{color:rgba(255,255,255,.8);background:rgba(255,255,255,.06);}
.subj-tab.active{color:white;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.15);}
.subj-tab.phy.active{background:rgba(59,130,196,.3);border-color:rgba(59,130,196,.4);}
.subj-tab.chem.active{background:rgba(107,143,94,.3);border-color:rgba(107,143,94,.4);}
.subj-tab.math.active{background:rgba(200,150,42,.25);border-color:rgba(200,150,42,.35);}
.subj-tab.bio.active{background:rgba(124,92,191,.3);border-color:rgba(124,92,191,.4);}

.tb-right{display:flex;align-items:center;gap:10px;}

/* Timer */
.timer-box{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:6px 14px;display:flex;align-items:center;gap:8px;}
.timer-box.warning{background:rgba(200,150,42,.15);border-color:rgba(200,150,42,.3);}
.timer-box.danger{background:rgba(200,75,75,.18);border-color:rgba(200,75,75,.35);animation:timerPulse 1s infinite;}
@keyframes timerPulse{0%,100%{opacity:1;}50%{opacity:.7;}}
.timer-icon{font-size:.88rem;}
.timer-val{font-family:var(--font-m);font-size:.92rem;font-weight:600;color:white;letter-spacing:.04em;}
.timer-lbl{font-size:.56rem;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.08em;}

.btn{font-family:var(--font-b);font-size:.76rem;font-weight:600;padding:7px 14px;border-radius:9px;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:5px;border:none;}
.btn-ghost-light{background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.15);color:rgba(255,255,255,.75);}
.btn-ghost-light:hover{background:rgba(255,255,255,.14);color:white;}
.btn-submit{background:linear-gradient(135deg,var(--sage),#4a7a3d);color:white;padding:8px 18px;box-shadow:0 2px 12px var(--sage-glow);}
.btn-submit:hover{box-shadow:0 4px 18px var(--sage-glow);transform:translateY(-1px);}
.btn-danger{background:linear-gradient(135deg,var(--rose),#e06b6b);color:white;}

/* ═══ MAIN LAYOUT ═══ */
.layout{display:flex;height:calc(100vh - 56px);overflow:hidden;}

/* ═══ LEFT — QUESTION PANEL ═══ */
.q-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;border-right:1px solid var(--border);}

/* Section bar */
.section-bar{background:var(--cream-warm);border-bottom:1px solid var(--border);padding:8px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
.section-label{font-family:var(--font-d);font-size:.72rem;font-weight:700;color:var(--forest-muted);text-transform:uppercase;letter-spacing:.06em;}
.section-tabs{display:flex;gap:4px;}
.sec-tab{font-family:var(--font-d);font-size:.7rem;font-weight:600;padding:4px 12px;border-radius:7px;border:1.5px solid var(--border-med);background:var(--cream-warm);color:var(--forest-muted);cursor:pointer;transition:all .18s;}
.sec-tab:hover{border-color:var(--sage);color:var(--sage);}
.sec-tab.active{background:var(--forest);color:white;border-color:var(--forest);}
.q-progress-bar{height:3px;background:var(--border);flex-shrink:0;}
.q-progress-fill{height:100%;background:linear-gradient(90deg,var(--sage),#4a7a3d);transition:width .4s ease;}

/* Question body */
.q-body{flex:1;overflow-y:auto;padding:24px;}
.q-body::-webkit-scrollbar{width:3px;}
.q-body::-webkit-scrollbar-thumb{background:var(--border-med);border-radius:3px;}

/* Q Header */
.q-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;gap:12px;}
.q-num-badge{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.q-num{width:36px;height:36px;border-radius:9px;background:var(--forest);color:white;display:flex;align-items:center;justify-content:center;font-family:var(--font-d);font-size:.82rem;font-weight:800;}
.q-type-info{display:flex;flex-direction:column;gap:3px;}
.q-type-badge{font-size:.62rem;font-weight:700;padding:2px 8px;border-radius:100px;}
.qt-single{background:var(--sky-light);color:var(--sky);border:1px solid rgba(59,130,196,.2);}
.qt-multi{background:var(--purple-light);color:var(--purple);border:1px solid rgba(124,92,191,.2);}
.qt-integer{background:var(--amber-light);color:var(--amber);border:1px solid rgba(184,115,51,.2);}
.qt-para{background:var(--gold-dim);color:var(--gold);border:1px solid rgba(200,150,42,.2);}
.q-marks-info{font-size:.64rem;color:rgba(26,38,24,.4);display:flex;gap:10px;}
.marks-correct{color:var(--sage);font-weight:600;}
.marks-wrong{color:var(--rose);font-weight:600;}
.q-actions{display:flex;gap:6px;}
.q-action-btn{width:30px;height:30px;border-radius:8px;border:1.5px solid var(--border-med);background:var(--cream-warm);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.8rem;transition:all .18s;}
.q-action-btn:hover{border-color:var(--sage);background:var(--sage-light);}
.q-action-btn.bookmarked{background:var(--gold-dim);border-color:rgba(200,150,42,.3);}

/* Question text */
.q-text-block{background:white;border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:16px;}
.q-subject-tag{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.qt-phy{color:var(--sky);}
.qt-chem{color:var(--sage);}
.qt-math{color:var(--gold);}
.qt-bio{color:var(--purple);}
.q-text{font-family:var(--font-s);font-size:.92rem;color:var(--forest);line-height:1.75;margin-bottom:0;}
.q-text .math{font-family:var(--font-m);background:var(--cream-warm);padding:2px 7px;border-radius:5px;font-size:.88rem;color:var(--forest);border:1px solid var(--border);}
.q-diagram{background:var(--cream-warm);border:1px solid var(--border);border-radius:10px;padding:16px;text-align:center;margin-top:12px;font-size:.78rem;color:rgba(26,38,24,.4);}

/* Options */
.q-opts{display:flex;flex-direction:column;gap:8px;margin-bottom:20px;}
.opt{display:flex;align-items:flex-start;gap:12px;padding:13px 16px;border-radius:12px;border:2px solid var(--border-med);background:white;cursor:pointer;transition:all .22s;position:relative;}
.opt:hover{border-color:var(--sage);background:var(--sage-light);}
.opt.selected{border-color:var(--sky);background:var(--sky-light);}
.opt.selected .opt-key{background:var(--sky);color:white;border-color:var(--sky);}
.opt.correct{border-color:var(--sage);background:var(--sage-light);}
.opt.correct .opt-key{background:var(--sage);color:white;border-color:var(--sage);}
.opt.wrong{border-color:var(--rose);background:var(--rose-light);}
.opt.wrong .opt-key{background:var(--rose);color:white;border-color:var(--rose);}
.opt-key{width:28px;height:28px;border-radius:8px;border:2px solid var(--border-strong);background:var(--cream-warm);display:flex;align-items:center;justify-content:center;font-family:var(--font-d);font-size:.72rem;font-weight:800;color:var(--forest-muted);flex-shrink:0;transition:all .22s;}
.opt-text{font-size:.84rem;color:var(--forest);line-height:1.5;padding-top:1px;}
.opt-text .math{font-family:var(--font-m);background:var(--cream-warm);padding:1px 6px;border-radius:4px;font-size:.8rem;border:1px solid var(--border);}

/* Integer input */
.integer-input-wrap{display:flex;flex-direction:column;gap:10px;margin-bottom:20px;}
.integer-label{font-size:.76rem;font-weight:600;color:var(--forest-muted);}
.integer-input{font-family:var(--font-m);font-size:1.2rem;font-weight:700;color:var(--forest);background:white;border:2px solid var(--border-med);border-radius:12px;padding:14px 18px;outline:none;width:180px;text-align:center;transition:all .22s;}
.integer-input:focus{border-color:var(--sage);box-shadow:0 0 0 3px var(--sage-light);}
.calc-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;width:180px;}
.calc-btn{font-family:var(--font-m);font-size:.88rem;font-weight:600;padding:10px;border-radius:9px;border:1.5px solid var(--border-med);background:var(--cream-warm);color:var(--forest);cursor:pointer;transition:all .18s;text-align:center;}
.calc-btn:hover{border-color:var(--sage);background:var(--sage-light);}
.calc-btn.special{background:var(--forest);color:white;border-color:var(--forest);}

/* Q Footer — navigation */
.q-footer{background:var(--cream-warm);border-top:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.q-nav-btn{font-family:var(--font-d);font-size:.78rem;font-weight:600;padding:9px 18px;border-radius:10px;cursor:pointer;transition:all .2s;border:1.5px solid;display:flex;align-items:center;gap:6px;}
.q-nav-prev{background:var(--cream-warm);border-color:var(--border-strong);color:var(--forest-muted);}
.q-nav-prev:hover{border-color:var(--sage);color:var(--sage);}
.q-nav-next{background:linear-gradient(135deg,var(--forest),var(--forest-soft));color:white;border-color:transparent;}
.q-nav-next:hover{box-shadow:var(--sh-hover);transform:translateY(-1px);}
.q-mark-btn{font-family:var(--font-d);font-size:.76rem;font-weight:600;padding:8px 16px;border-radius:10px;border:1.5px solid rgba(200,150,42,.3);background:var(--gold-dim);color:var(--gold);cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:5px;}
.q-mark-btn:hover{background:rgba(200,150,42,.15);}
.q-mark-btn.marked{background:var(--gold);color:white;border-color:var(--gold);}
.q-clear-btn{font-family:var(--font-d);font-size:.76rem;font-weight:600;padding:8px 16px;border-radius:10px;border:1.5px solid var(--border-med);background:none;color:var(--forest-muted);cursor:pointer;transition:all .2s;}
.q-clear-btn:hover{border-color:var(--rose);color:var(--rose);}
.q-spacer{flex:1;}
.q-counter{font-family:var(--font-m);font-size:.72rem;color:rgba(26,38,24,.4);}

/* ═══ RIGHT — PALETTE ═══ */
.palette-panel{width:280px;flex-shrink:0;background:white;border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.palette-header{padding:14px 16px 10px;border-bottom:1px solid var(--border);flex-shrink:0;}
.palette-title{font-family:var(--font-d);font-size:.8rem;font-weight:700;color:var(--forest);margin-bottom:10px;}

/* Status legend */
.legend{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:0;}
.leg-item{display:flex;align-items:center;gap:6px;font-size:.65rem;color:var(--forest-muted);}
.leg-dot{width:18px;height:18px;border-radius:5px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.58rem;font-weight:700;}
.leg-answered{background:var(--sage);color:white;}
.leg-not-answered{background:var(--rose-light);color:var(--rose);border:1.5px solid rgba(200,75,75,.25);}
.leg-not-visited{background:var(--cream-warm);color:rgba(26,38,24,.4);border:1.5px solid var(--border-strong);}
.leg-marked{background:var(--gold);color:white;}
.leg-marked-answered{background:var(--purple);color:white;}

/* Palette scroll area */
.palette-scroll{flex:1;overflow-y:auto;padding:12px 14px;}
.palette-scroll::-webkit-scrollbar{width:3px;}
.palette-scroll::-webkit-scrollbar-thumb{background:var(--border-med);border-radius:3px;}
.palette-subj-label{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:rgba(26,38,24,.35);margin:10px 0 7px;display:flex;align-items:center;gap:7px;}
.palette-subj-label::after{content:'';flex:1;height:1px;background:var(--border);}
.palette-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-bottom:4px;}
.p-btn{width:100%;aspect-ratio:1;border-radius:8px;border:2px solid;display:flex;align-items:center;justify-content:center;font-family:var(--font-m);font-size:.7rem;font-weight:600;cursor:pointer;transition:all .18s;position:relative;}
.p-btn:hover{transform:scale(1.1);}
.p-btn.current{box-shadow:0 0 0 2px var(--forest),0 0 0 4px rgba(26,38,24,.15);}
/* States */
.p-not-visited{background:var(--cream-warm);border-color:var(--border-strong);color:rgba(26,38,24,.4);}
.p-answered{background:var(--sage);border-color:#4a7a3d;color:white;}
.p-not-answered{background:var(--rose-light);border-color:rgba(200,75,75,.35);color:var(--rose);}
.p-marked{background:var(--gold);border-color:#b8832a;color:white;}
.p-marked-answered{background:var(--purple);border-color:#6b4ba8;color:white;}
.p-btn.current.p-answered{box-shadow:0 0 0 2px #4a7a3d,0 0 0 4px rgba(107,143,94,.25);}
.p-btn.current.p-not-answered{box-shadow:0 0 0 2px var(--rose),0 0 0 4px var(--rose-light);}
.p-btn.current.p-not-visited{box-shadow:0 0 0 2px var(--forest),0 0 0 4px rgba(26,38,24,.15);}

/* Summary strip */
.summary-strip{background:var(--cream-warm);border-top:1px solid var(--border);padding:10px 14px;flex-shrink:0;}
.summary-row{display:flex;justify-content:space-between;margin-bottom:6px;}
.sum-item{text-align:center;}
.sum-n{font-family:var(--font-d);font-size:.9rem;font-weight:800;color:var(--forest);}
.sum-l{font-size:.56rem;color:rgba(26,38,24,.38);text-transform:uppercase;letter-spacing:.05em;}
.sum-n.answered{color:var(--sage);}
.sum-n.not-ans{color:var(--rose);}
.sum-n.marked{color:var(--gold);}
.sum-n.not-vis{color:rgba(26,38,24,.35);}
.submit-btn{width:100%;font-family:var(--font-d);font-size:.82rem;font-weight:700;padding:11px;border-radius:11px;border:none;cursor:pointer;background:linear-gradient(135deg,var(--sage),#4a7a3d);color:white;box-shadow:0 4px 14px var(--sage-glow);transition:all .22s;margin-top:6px;}
.submit-btn:hover{box-shadow:0 6px 20px var(--sage-glow);transform:translateY(-1px);}

/* ═══ SUBMIT MODAL ═══ */
.mo{position:fixed;inset:0;z-index:500;background:rgba(26,38,24,.6);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;padding:20px;}
.mo.open{display:flex;}
.mb{background:white;border:1px solid var(--border-med);border-radius:22px;padding:30px;width:480px;max-width:95vw;box-shadow:var(--sh-deep);animation:mpop .25s cubic-bezier(.34,1.56,.64,1);}
@keyframes mpop{from{transform:scale(.9);opacity:0;}to{transform:scale(1);opacity:1;}}
.mb-title{font-family:var(--font-d);font-size:1.05rem;font-weight:800;color:var(--forest);margin-bottom:6px;letter-spacing:-.03em;}
.mb-sub{font-size:.78rem;color:rgba(26,38,24,.5);margin-bottom:20px;}
.mb-stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:18px;}
.mb-stat{background:var(--cream-warm);border:1px solid var(--border);border-radius:11px;padding:12px 14px;}
.mb-stat-n{font-family:var(--font-d);font-size:1.2rem;font-weight:800;margin-bottom:2px;}
.mb-stat-l{font-size:.62rem;font-weight:500;color:rgba(26,38,24,.4);text-transform:uppercase;letter-spacing:.06em;}
.mb-warn{background:var(--rose-light);border:1px solid rgba(200,75,75,.2);border-radius:11px;padding:11px 14px;font-size:.76rem;color:var(--rose);margin-bottom:18px;display:flex;align-items:center;gap:8px;}
.mb-actions{display:flex;gap:9px;}
.mb-cancel{flex:1;font-family:var(--font-d);font-size:.8rem;font-weight:600;padding:11px;border-radius:10px;border:1.5px solid var(--border-med);background:none;color:var(--forest-muted);cursor:pointer;}
.mb-cancel:hover{border-color:var(--sage);color:var(--sage);}
.mb-confirm{flex:2;font-family:var(--font-d);font-size:.82rem;font-weight:700;padding:11px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--sage),#4a7a3d);color:white;cursor:pointer;box-shadow:0 4px 14px var(--sage-glow);}
.mb-confirm:hover{transform:translateY(-1px);}

/* ═══ RESULT VIEW ═══ */
.result-view{display:none;flex-direction:column;height:100vh;overflow-y:auto;}
.result-view::-webkit-scrollbar{width:3px;}
.result-view::-webkit-scrollbar-thumb{background:var(--border-med);border-radius:3px;}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.fade{animation:fadeIn .3s ease;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:var(--border-med);border-radius:3px;}

</style>

<style id="mobile-fix">
@media(max-width:860px){
  html,body{height:auto!important;overflow-x:hidden!important;overflow-y:auto!important;}
  .sb{transform:translateX(-100%)!important;transition:transform .3s ease!important;position:fixed!important;z-index:9999!important;height:100%!important;}
  .sb.mob-open{transform:translateX(0)!important;}
  .mob-overlay{position:fixed!important;inset:0!important;background:rgba(0,0,0,.55)!important;z-index:9998!important;display:none!important;}
  .mob-overlay.mob-open{display:block!important;}
  .mob-ham{display:flex!important;width:36px!important;height:36px!important;border-radius:8px!important;background:#f5f3ec!important;border:1.5px solid rgba(26,38,24,.13)!important;align-items:center!important;justify-content:center!important;cursor:pointer!important;font-size:1.1rem!important;flex-shrink:0!important;color:#1a2618!important;margin-right:4px!important;}
  .main{margin-left:0!important;width:100vw!important;height:auto!important;min-height:100vh!important;display:block!important;overflow-y:auto!important;}
  .tb{position:sticky!important;top:0!important;z-index:200!important;padding:0 12px!important;height:52px!important;gap:8px!important;flex-shrink:0!important;}
  .tb-search{display:none!important;}

  {subj:2,sec:2,id:57,text:'If the sum of first n natural numbers is 210, then n is:',type:'integer',ans:'20'},
  {subj:2,sec:2,id:58,text:'The number of 3-digit even numbers that can be formed using digits 1,2,3,4,5 (repetition allowed) is:',type:'integer',ans:'50'},
  {subj:2,sec:2,id:59,text:'If |z| = 2 and arg(z) = π/3, then Re(z) + Im(z) = (answer rounded to nearest integer, ×10⁻¹):',type:'integer',ans:'27'},
  {subj:2,sec:2,id:60,text:'The rank of matrix [[1,2,3],[4,5,6],[7,8,9]] is:',type:'integer',ans:'2'},
];

// ════ STATE ════
const totalTime = 3 * 3600; // 3 hours in seconds
let timeLeft = totalTime;
let currentSubj = 0;
let currentSec = 0;
let currentQIdx = 0; // index within current subj+sec

// State per question
const qState = {}; // key: q.id → {visited, answered, marked, answer}
QUESTIONS.forEach(q => {
  qState[q.id] = {visited:false, answered:false, marked:false, answer:q.type==='integer'?'':null};
});

function getQuestionsFor(subj, sec){
  return QUESTIONS.filter(q => q.subj===subj && q.sec===sec);
}

function getCurrentQ(){
  const qs = getQuestionsFor(currentSubj, currentSec);
  return qs[currentQIdx] || null;
}

function getGlobalIdx(){
  let idx = 0;
  for(let s=0;s<currentSubj;s++) idx += SUBJECTS[s].sections.reduce((a,b)=>a+b.qCount,0);
  for(let sc=0;sc<currentSec;sc++) idx += SUBJECTS[currentSubj].sections[sc].qCount;
  idx += currentQIdx;
  return idx;
}

// ════ RENDER ════
function renderSectionTabs(){
  const tabs = document.getElementById('section-tabs');
  const secs = SUBJECTS[currentSubj].sections;
  tabs.innerHTML = secs.map((s,i)=>`
    <button class="sec-tab ${i===currentSec?'active':''}" onclick="switchSection(${i})">${s.name} (${s.type==='single'?'MCQ':s.type==='multi'?'MSQ':'Int.'})</button>
  `).join('');
  const qs = getQuestionsFor(currentSubj, currentSec);
  document.getElementById('sec-info').textContent = `Q ${currentQIdx+1} of ${qs.length}`;
}

function renderQuestion(){
  const q = getCurrentQ();
  if(!q) return;
  const st = qState[q.id];
  st.visited = true;

  const subj = SUBJECTS[q.subj];
  const sec = subj.sections[q.sec];
  const qs = getQuestionsFor(currentSubj, currentSec);
  const totalQs = QUESTIONS.length;
  const answeredCount = QUESTIONS.filter(qq=>qState[qq.id].answered).length;

  // Progress
  document.getElementById('q-progress').style.width = `${(answeredCount/totalQs)*100}%`;
  document.getElementById('q-counter').textContent = `Q${getGlobalIdx()+1} / ${totalQs}`;
  document.getElementById('sec-info').textContent = `Q ${currentQIdx+1} of ${qs.length}`;

  // Mark button
  const markBtn = document.getElementById('mark-btn');
  markBtn.classList.toggle('marked', st.marked);
  markBtn.textContent = st.marked ? '🔖 Marked for Review' : '🔖 Mark for Review';

  // Type badge
  const typeName = q.multi?'Multi Correct':q.type==='integer'?'Integer Type':sec.type==='single'?'Single Correct':'Single Correct';
  const typeClass = q.multi?'qt-multi':q.type==='integer'?'qt-integer':'qt-single';

  let optsHtml = '';
  if(q.type === 'integer'){
    optsHtml = `
    <div class="integer-input-wrap">
      <div class="integer-label">Enter your answer (integer value):</div>
      <input type="number" class="integer-input" id="int-input" value="${st.answer||''}" placeholder="0" oninput="saveInteger(this.value)">
      <div class="calc-pad">
        ${[7,8,9,4,5,6,1,2,3].map(n=>`<button class="calc-btn" onclick="appendDigit('${n}')">${n}</button>`).join('')}
        <button class="calc-btn" onclick="appendDigit('0')">0</button>
        <button class="calc-btn" onclick="appendDigit('-')">−</button>
        <button class="calc-btn special" onclick="clearInt()">✕</button>
      </div>
    </div>`;
  } else {
    optsHtml = `<div class="q-opts">
      ${q.opts.map((opt,i)=>{
        let cls = '';
        if(q.multi){
          if(st.answer && st.answer.includes(i)) cls = 'selected';
        } else {
          if(st.answer === i) cls = 'selected';
        }
        return `<div class="opt ${cls}" onclick="selectOpt(${i})">
          <div class="opt-key">${['A','B','C','D'][i]}</div>
          <div class="opt-text">${opt}</div>
        </div>`;
      }).join('')}
    </div>`;
  }

  document.getElementById('q-body').innerHTML = `
    <div class="q-header">
      <div class="q-num-badge">
        <div class="q-num">Q${getGlobalIdx()+1}</div>
        <div class="q-type-info">
          <span class="q-type-badge ${typeClass}">${typeName}</span>
          <div class="q-marks-info">
            <span class="marks-correct">${sec.marks.split('/')[0].trim()} correct</span>
            <span class="marks-wrong">${sec.marks.split('/')[1].trim()} wrong</span>
          </div>
        </div>
      </div>
      <div class="q-actions">
        <button class="q-action-btn ${st.marked?'bookmarked':''}" onclick="toggleMark()" title="Bookmark">🔖</button>
        <button class="q-action-btn" onclick="alert('Hint: ${q.hint||'Think carefully about the concept.'}')" title="Hint">💡</button>
        <button class="q-action-btn" onclick="alert('Report issue submitted!')" title="Report">⚑</button>
      </div>
    </div>
    <div class="q-text-block">
      <div class="q-subject-tag ${subj.cls}">${subj.icon} ${subj.name} · ${sec.name}</div>
      <div class="q-text">${q.text}</div>
    </div>
    ${optsHtml}
    ${q.multi?'<div style="font-size:.72rem;color:rgba(26,38,24,.45);background:var(--purple-light);border:1px solid rgba(124,92,191,.2);border-radius:8px;padding:8px 12px;margin-bottom:16px;">ℹ️ One or more options may be correct. Select all that apply.</div>':''}
  `;

  renderPalette();
  updateSummary();
}

function selectOpt(i){
  const q = getCurrentQ();
  if(!q) return;
  const st = qState[q.id];

  if(q.multi){
    if(!Array.isArray(st.answer)) st.answer = [];
    if(st.answer.includes(i)) st.answer = st.answer.filter(x=>x!==i);
    else st.answer.push(i);
    st.answered = st.answer.length > 0;
  } else {
    st.answer = i;
    st.answered = true;
  }
  renderQuestion();
}

function saveInteger(val){
  const q = getCurrentQ();
  if(!q) return;
  qState[q.id].answer = val;
  qState[q.id].answered = val !== '' && val !== null;
  updateSummary();
  renderPalette();
}

function appendDigit(d){
  const inp = document.getElementById('int-input');
  if(!inp) return;
  if(d==='-') inp.value = inp.value.startsWith('-') ? inp.value.slice(1) : '-'+inp.value;
  else inp.value = inp.value + d;
  saveInteger(inp.value);
}

function clearInt(){
  const inp = document.getElementById('int-input');
  if(inp){ inp.value=''; saveInteger(''); }
}

function clearAnswer(){
  const q = getCurrentQ();
  if(!q) return;
  const st = qState[q.id];
  st.answer = q.type==='integer' ? '' : null;
  st.answered = false;
  st.marked = false;
  renderQuestion();
}

function toggleMark(){
  const q = getCurrentQ();
  if(!q) return;
  qState[q.id].marked = !qState[q.id].marked;
  renderQuestion();
}

function navigate(dir){
  const qs = getQuestionsFor(currentSubj, currentSec);
  const newIdx = currentQIdx + dir;

  if(newIdx >= 0 && newIdx < qs.length){
    currentQIdx = newIdx;
  } else if(dir > 0){
    // Move to next section or subject
    const secs = SUBJECTS[currentSubj].sections;
    if(currentSec < secs.length - 1){
      currentSec++;
      currentQIdx = 0;
    } else if(currentSubj < SUBJECTS.length - 1){
      currentSubj++;
      currentSec = 0;
      currentQIdx = 0;
      updateSubjTabs();
    }
  } else {
    // Move to prev section or subject
    if(currentSec > 0){
      currentSec--;
      currentQIdx = getQuestionsFor(currentSubj,currentSec).length - 1;
    } else if(currentSubj > 0){
      currentSubj--;
      currentSec = SUBJECTS[currentSubj].sections.length - 1;
      currentQIdx = getQuestionsFor(currentSubj,currentSec).length - 1;
      updateSubjTabs();
    }
  }
  renderSectionTabs();
  renderQuestion();
}

function switchSubject(idx, el){
  currentSubj = idx;
  currentSec = 0;
  currentQIdx = 0;
  updateSubjTabs();
  renderSectionTabs();
  renderQuestion();
}

function updateSubjTabs(){
  document.querySelectorAll('.subj-tab').forEach((t,i)=>{
    t.classList.toggle('active', i===currentSubj);
  });
}

function switchSection(idx){
  currentSec = idx;
  currentQIdx = 0;
  renderSectionTabs();
  renderQuestion();
}

function jumpToQ(subj, sec, idx){
  currentSubj = subj;
  currentSec = sec;
  currentQIdx = idx;
  updateSubjTabs();
  renderSectionTabs();
  renderQuestion();
}

// ════ PALETTE ════
function renderPalette(){
  const palette = document.getElementById('palette');
  let html = '';
  const q = getCurrentQ();

  SUBJECTS.forEach((subj, si) => {
    html += `<div class="palette-subj-label">${subj.icon} ${subj.name}</div>`;
    subj.sections.forEach((sec,sci) => {
      const qs = getQuestionsFor(si, sci);
      if(qs.length === 0) return;
      html += `<div style="font-size:.6rem;color:rgba(26,38,24,.35);margin-bottom:5px;">${sec.name}</div>`;
      html += '<div class="palette-grid">';
      qs.forEach((qq, qi) => {
        const st = qState[qq.id];
        const isCurrent = qq.id === (q?q.id:0);
        let cls = 'p-not-visited';
        if(st.answered && st.marked) cls = 'p-marked-answered';
        else if(st.answered) cls = 'p-answered';
        else if(st.marked) cls = 'p-marked';
        else if(st.visited) cls = 'p-not-answered';
        const globalN = getGlobalQNum(si, sci, qi);
        html += `<button class="p-btn ${cls} ${isCurrent?'current':''}" onclick="jumpToQ(${si},${sci},${qi})" title="Q${globalN}">${globalN}</button>`;
      });
      html += '</div>';
    });
  });
  palette.innerHTML = html;
}

function getGlobalQNum(si, sci, qi){
  let n = 1;
  for(let s=0;s<si;s++) n += SUBJECTS[s].sections.reduce((a,b)=>a+b.qCount,0);
  for(let sc=0;sc<sci;sc++) n += SUBJECTS[si].sections[sc].qCount;
  n += qi;
  return n;
}

function updateSummary(){
  const answered = QUESTIONS.filter(q=>qState[q.id].answered && !qState[q.id].marked).length;
  const notAns = QUESTIONS.filter(q=>qState[q.id].visited && !qState[q.id].answered && !qState[q.id].marked).length;
  const marked = QUESTIONS.filter(q=>qState[q.id].marked && !qState[q.id].answered).length;
  const markedAns = QUESTIONS.filter(q=>qState[q.id].marked && qState[q.id].answered).length;
  const notVis = QUESTIONS.filter(q=>!qState[q.id].visited).length;

  document.getElementById('sum-answered').textContent = answered + markedAns;
  document.getElementById('sum-not-ans').textContent = notAns;
  document.getElementById('sum-marked').textContent = marked;
  document.getElementById('sum-not-vis').textContent = notVis;
}

// ════ TIMER ════
function formatTime(s){
  const h=Math.floor(s/3600), m=Math.floor((s%3600)/60), sec=s%60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

const timerInterval = setInterval(()=>{
  if(timeLeft <= 0){ clearInterval(timerInterval); autoSubmit(); return; }
  timeLeft--;
  document.getElementById('timer').textContent = formatTime(timeLeft);
  const box = document.getElementById('timer-box');
  if(timeLeft <= 300){ box.className='timer-box danger'; }
  else if(timeLeft <= 900){ box.className='timer-box warning'; }
}, 1000);

function autoSubmit(){
  alert('Time is up! Submitting your test automatically...');
  submitTest();
}

// ════ SUBMIT ════
function openSubmit(){
  const answered = QUESTIONS.filter(q=>qState[q.id].answered).length;
  const notAns = QUESTIONS.filter(q=>qState[q.id].visited && !qState[q.id].answered).length;
  const marked = QUESTIONS.filter(q=>qState[q.id].marked).length;
  const notVis = QUESTIONS.filter(q=>!qState[q.id].visited).length;

  document.getElementById('modal-time').textContent = formatTime(timeLeft);
  document.getElementById('modal-stats').innerHTML = `
    <div class="mb-stat"><div class="mb-stat-n" style="color:var(--sage)">${answered}</div><div class="mb-stat-l">Answered</div></div>
    <div class="mb-stat"><div class="mb-stat-n" style="color:var(--rose)">${notAns}</div><div class="mb-stat-l">Not Answered</div></div>
    <div class="mb-stat"><div class="mb-stat-n" style="color:var(--gold)">${marked}</div><div class="mb-stat-l">Marked</div></div>
    <div class="mb-stat"><div class="mb-stat-n" style="color:rgba(26,38,24,.35)">${notVis}</div><div class="mb-stat-l">Not Visited</div></div>
  `;
  document.getElementById('modal-warn').innerHTML = notVis > 0
    ? `⚠️ You have <strong>${notVis} questions not visited</strong>. Make sure you haven't missed any section.`
    : answered < QUESTIONS.length
    ? `⚠️ <strong>${QUESTIONS.length - answered} questions unanswered</strong>. Unanswered questions get 0 marks.`
    : `✅ All ${QUESTIONS.length} questions answered. Great job!`;
  document.getElementById('submit-modal').classList.add('open');
}

function closeSubmit(){
  document.getElementById('submit-modal').classList.remove('open');
}

function submitTest(){
  clearInterval(timerInterval);
  closeSubmit();

  // Calculate score
  let score = 0, correct = 0, wrong = 0, skipped = 0;
  QUESTIONS.forEach(q => {
    const st = qState[q.id];
    const subj = SUBJECTS[q.subj];
    const sec = subj.sections[q.sec];
    const marks = parseInt(sec.marks.split('/')[0]);
    const negative = parseInt(sec.marks.split('/')[1]);

    if(!st.answered){ skipped++; return; }
    if(q.multi){
      const correctSet = new Set(q.ans);
      const selectedSet = new Set(st.answer);
      const isFullyCorrect = correctSet.size === selectedSet.size && [...correctSet].every(x=>selectedSet.has(x));
      if(isFullyCorrect){ score += marks; correct++; }
      else { score += negative; wrong++; }
    } else if(q.type === 'integer'){
      if(String(st.answer).trim() === String(q.ans)){ score += marks; correct++; }
      else { skipped++; }
    } else {
      if(st.answer === q.ans){ score += marks; correct++; }
      else { score += negative; wrong++; }
    }
  });

  const pct = Math.round((correct/QUESTIONS.length)*100);
  const timeTaken = totalTime - timeLeft;
  const th = Math.floor(timeTaken/3600), tm = Math.floor((timeTaken%3600)/60);

    <div style="position:absolute;width:300px;height:300px;border-radius:50%;background:rgba(107,143,94,.15);filter:blur(60px);top:-60px;right:60px;pointer-events:none;"></div>
    <div style="max-width:900px;margin:0 auto;position:relative;z-index:1;">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;text-decoration:none;" onclick="window.location.href='mockarena_dashboard.html'">
        <div style="width:32px;height:32px;background:linear-gradient(135deg,var(--sage),#4a7a3d);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:.76rem;font-weight:800;color:white;">MA</div>
        <span style="font-family:var(--font-d);font-size:.95rem;font-weight:900;color:white;">Mock</span><span style="font-family:var(--font-d);font-size:.95rem;font-weight:900;background:linear-gradient(135deg,#818cf8,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">Arena</span>
      </div>
      <div style="font-size:.68rem;font-weight:600;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;">JEE Advanced Full Mock #15 · Result</div>
      <div style="font-family:var(--font-d);font-size:1.6rem;font-weight:900;color:white;letter-spacing:-.04em;margin-bottom:6px;">
        ${score >= 180 ? '🏆 Excellent Performance!' : score >= 120 ? '👍 Good Attempt!' : score >= 60 ? '📈 Keep Improving!' : '💪 Never Give Up!'}
      </div>
      <div style="font-size:.82rem;color:rgba(255,255,255,.45);">Time taken: ${th}h ${tm}m · ${QUESTIONS.length} Questions · PCM</div>
    </div>
  </div>

  <div style="max-width:900px;margin:0 auto;padding:28px 20px;width:100%;">
    <!-- Score Card -->
    <div style="background:white;border:1px solid var(--border);border-radius:20px;padding:24px;margin-bottom:20px;box-shadow:var(--sh);">
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;">

        ].map(([n,l,c])=>`

          <div style="font-family:var(--font-d);font-size:1.8rem;font-weight:800;color:${c};letter-spacing:-.04em;">${n}</div>
          <div style="font-size:.66rem;font-weight:600;color:rgba(26,38,24,.4);text-transform:uppercase;letter-spacing:.06em;margin-top:4px;">${l}</div>
        </div>`).join('')}
      </div>

      <!-- Accuracy bar -->
      <div style="margin-bottom:14px;">
        <div style="display:flex;justify-content:space-between;font-size:.76rem;font-weight:600;color:var(--forest-muted);margin-bottom:6px;">

        </div>
        <div style="height:8px;background:var(--cream-warm);border-radius:4px;overflow:hidden;border:1px solid var(--border);">

      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;">

    <!-- Solution Review -->
    <div style="background:white;border:1px solid var(--border);border-radius:20px;padding:24px;margin-bottom:20px;box-shadow:var(--sh);">

          else isCorrect = st.answer===q.ans;
          status = isCorrect?'correct':'wrong';

          <div style="flex:1;">
            <div style="font-size:.74rem;font-weight:600;color:var(--forest);margin-bottom:3px;">Q${i+1} — ${subj.name} · ${q.type==='integer'?'Integer':q.multi?'Multi Correct':'Single Correct'}</div>
            <div style="font-size:.7rem;color:rgba(26,38,24,.5);line-height:1.5;">${q.text.substring(0,100)}${q.text.length>100?'...':''}</div>
            ${!q.multi&&q.type!=='integer'?`<div style="font-size:.68rem;color:var(--sage);margin-top:3px;">✓ Correct: ${q.opts[q.ans]}</div>`:''}
            ${q.type==='integer'?`<div style="font-size:.68rem;color:var(--sage);margin-top:3px;">✓ Answer: ${q.ans}</div>`:''}
          </div>
        </div>`;
      }).join('')}
    </div>

              name:user.displayName||doc.data().name||"Student",
              photo:user.photoURL||doc.data().photo||""

        });
