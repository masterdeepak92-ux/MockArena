<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MockArena — JEE Advanced Full Mock #15</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Lora:ital,wght@0,400;0,600;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --cream:#faf9f5;--cream-w:#f5f3ec;
  --forest:#1a2618;--forest-s:#243422;--forest-m:#3d5239;
  --sage:#6b8f5e;--sage-l:rgba(107,143,94,.1);--sage-g:rgba(107,143,94,.2);
  --gold:#c8962a;--gold-d:rgba(200,150,42,.08);
  --rose:#c84b4b;--rose-l:rgba(200,75,75,.09);
  --sky:#3b82c4;--sky-l:rgba(59,130,196,.09);
  --amber:#b87333;--amb-l:rgba(184,115,51,.09);
  --purple:#7c5cbf;--pur-l:rgba(124,92,191,.09);
  --border:rgba(26,38,24,.08);--bm:rgba(26,38,24,.13);
  --fd:'Outfit',sans-serif;--fs:'Lora',serif;--fm:'IBM Plex Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;-webkit-font-smoothing:antialiased;}
body{font-family:var(--fd);background:var(--cream-w);color:var(--forest);display:flex;flex-direction:column;overflow:hidden;}
@media(max-width:860px){html,body{height:auto!important;overflow-x:hidden!important;overflow-y:auto!important;}}

.topbar{height:52px;background:var(--forest);display:flex;align-items:center;padding:0 14px;gap:8px;flex-shrink:0;border-bottom:2px solid rgba(107,143,94,.2);}
.tb-logo{display:flex;align-items:center;gap:7px;text-decoration:none;flex-shrink:0;}
.tb-mark{width:28px;height:28px;background:linear-gradient(135deg,var(--sage),#4a7a3d);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:800;color:white;}
.tb-n1{color:white;font-size:.86rem;font-weight:800;}
.tb-n2{font-size:.86rem;font-weight:800;background:linear-gradient(135deg,#818cf8,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.tb-pipe{width:1px;height:14px;background:rgba(255,255,255,.12);}
.tb-test{font-size:.64rem;font-weight:600;color:rgba(255,255,255,.3);}
.tb-subjs{display:flex;gap:2px;background:rgba(255,255,255,.07);border-radius:7px;padding:2px;margin:0 4px;}
.tsj{font-family:var(--fd);font-size:.66rem;font-weight:600;padding:4px 10px;border-radius:5px;border:none;background:none;color:rgba(255,255,255,.4);cursor:pointer;transition:all .2s;white-space:nowrap;}
.tsj:hover{color:rgba(255,255,255,.8);}
.tsj.on,.tsj.active{color:white;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.15);}
.tsj.phy.on,.tsj.phy.active{background:rgba(59,130,196,.3);}
.tsj.che.on,.tsj.che.active{background:rgba(107,143,94,.3);}
.tsj.mat.on,.tsj.mat.active{background:rgba(200,150,42,.25);}
.tsj.bio.on,.tsj.bio.active{background:rgba(124,92,191,.25);}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:6px;}
.tb-user{font-size:.64rem;color:rgba(255,255,255,.3);}
.tb-av{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--gold),#e8a830);display:flex;align-items:center;justify-content:center;font-size:.6rem;font-weight:700;color:white;overflow:hidden;}
.tb-timer{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:7px;padding:3px 9px;text-align:center;}
.tb-tv{font-family:var(--fm);font-size:.78rem;font-weight:600;color:white;letter-spacing:.04em;display:block;}
.tb-tl{font-size:.44rem;color:rgba(255,255,255,.25);text-transform:uppercase;letter-spacing:.07em;}
.tb-timer.warning,.tb-timer.warn{background:rgba(200,150,42,.15);border-color:rgba(200,150,42,.3);}
.tb-timer.warning .tb-tv,.tb-timer.warn .tb-tv{color:var(--gold);}
.tb-timer.danger{background:rgba(200,75,75,.15);border-color:rgba(200,75,75,.3);}
.tb-timer.danger .tb-tv{color:#ff6b6b;animation:blink .8s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.4;}}
.tb-btn{font-family:var(--fd);font-size:.66rem;font-weight:700;padding:6px 11px;border-radius:7px;border:none;cursor:pointer;transition:all .2s;}
.tb-instr{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12)!important;color:rgba(255,255,255,.6);}
.tb-submit{background:linear-gradient(135deg,var(--sage),#4a7a3d);color:white;box-shadow:0 2px 7px var(--sage-g);}

.sec-bar{background:white;border-bottom:1px solid var(--border);padding:5px 14px;display:flex;align-items:center;gap:6px;flex-shrink:0;}
.sec-lbl{font-size:.58rem;font-weight:700;color:rgba(26,38,24,.26);text-transform:uppercase;letter-spacing:.07em;}
.sec-tab{font-family:var(--fd);font-size:.64rem;font-weight:600;padding:3px 10px;border-radius:6px;border:1.5px solid var(--bm);background:var(--cream-w);color:var(--forest-m);cursor:pointer;transition:all .18s;}
.sec-tab:hover{border-color:var(--sage);color:var(--sage);}
.sec-tab.on,.sec-tab.active{background:var(--forest);color:white;border-color:var(--forest);}
.sec-inf{margin-left:auto;font-family:var(--fm);font-size:.58rem;color:rgba(26,38,24,.24);}
.prog{height:2px;background:var(--border);flex-shrink:0;}
.prog-f{height:100%;background:linear-gradient(90deg,var(--sage),#4a7a3d);transition:width .3s;}

.body-wrap{display:flex;flex:1;overflow:hidden;}
@media(max-width:860px){.body-wrap{flex-direction:column;overflow:visible;}}
.q-area{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.q-scroll{flex:1;overflow-y:auto;padding:14px 18px;background:var(--cream-w);}
.q-scroll::-webkit-scrollbar{width:4px;}
.q-scroll::-webkit-scrollbar-thumb{background:var(--bm);border-radius:4px;}

.q-footer{background:white;border-top:1px solid var(--border);padding:9px 14px;display:flex;align-items:center;gap:7px;flex-shrink:0;box-shadow:0 -2px 8px rgba(26,38,24,.05);flex-wrap:wrap;}
.fn-btn{font-family:var(--fd);font-size:.7rem;font-weight:700;padding:8px 13px;border-radius:9px;border:none;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:4px;white-space:nowrap;}
.fn-mark{background:var(--gold);color:white;}
.fn-mark.on{background:#e8a020;}
.fn-clear{background:none!important;border:1.5px solid var(--bm)!important;color:var(--forest-m);}
.fn-clear:hover{border-color:var(--rose)!important;color:var(--rose);}
.fn-save{background:var(--sage);color:white;}
.fn-sp{flex:1;}
.fn-ctr{font-family:var(--fm);font-size:.6rem;color:rgba(26,38,24,.25);}
.fn-prev{background:none!important;border:1.5px solid var(--bm)!important;color:var(--forest-m);}
.fn-next{background:var(--forest);color:white;}

.right-strip{width:50px;flex-shrink:0;background:var(--forest);display:flex;flex-direction:column;align-items:center;padding:8px 4px;gap:4px;border-left:1px solid rgba(255,255,255,.05);overflow-y:auto;}
.right-strip::-webkit-scrollbar{width:0;}
.rs-btn{width:38px;height:38px;border-radius:9px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;transition:all .2s;border:1.5px solid rgba(255,255,255,.08);background:rgba(255,255,255,.05);color:rgba(255,255,255,.4);font-size:.82rem;}
.rs-btn:hover{background:rgba(255,255,255,.12);color:white;}
.rs-btn.rs-on{background:rgba(107,143,94,.2);border-color:var(--sage);color:var(--sage);}
.rs-btn.rs-danger{background:rgba(200,75,75,.1);border-color:rgba(200,75,75,.2);color:#ff8888;}
.rs-lbl{font-size:.38rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;}
.rs-div{width:24px;height:1px;background:rgba(255,255,255,.06);margin:1px 0;}

.pal-overlay{display:none;position:fixed;inset:0;background:rgba(26,38,24,.5);backdrop-filter:blur(4px);z-index:200;}
.pal-overlay.on{display:block;}
.pal-drawer{position:fixed;top:0;right:-310px;width:290px;height:100vh;background:white;border-left:1px solid var(--border);display:flex;flex-direction:column;z-index:300;transition:right .28s cubic-bezier(.22,1,.36,1);box-shadow:-5px 0 28px rgba(26,38,24,.1);}
.pal-drawer.on{right:0;}
.pal-hdr{background:var(--forest);padding:12px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.pal-title{font-size:.76rem;font-weight:700;color:white;}
.pal-close{width:24px;height:24px;border-radius:6px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.14);color:white;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.74rem;transition:all .18s;}
.pal-close:hover{background:var(--rose);border-color:var(--rose);}
.pal-legend{padding:7px 11px;border-bottom:1px solid var(--border);flex-shrink:0;}
.pal-leg-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;}
.pal-leg-item{display:flex;align-items:center;gap:4px;font-size:.58rem;color:var(--forest-m);}
.pal-leg-dot{width:16px;height:16px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.5rem;font-weight:700;}
.lg-a{background:var(--sage);color:white;}.lg-n{background:var(--rose);color:white;}.lg-v{background:#bbb;color:white;}.lg-m{background:var(--gold);color:white;}.lg-ma{background:var(--purple);color:white;}
.pal-scroll{flex:1;overflow-y:auto;padding:8px 11px;}
.pal-scroll::-webkit-scrollbar{width:3px;}
.pal-scroll::-webkit-scrollbar-thumb{background:var(--bm);border-radius:3px;}
.palette-subj-label{font-size:.56rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:rgba(26,38,24,.25);margin:7px 0 4px;display:flex;align-items:center;gap:5px;}
.palette-subj-label::after{content:'';flex:1;height:1px;background:var(--border);}
.palette-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin-bottom:3px;}
.p-btn{width:100%;aspect-ratio:1;border-radius:50%;border:2px solid;display:flex;align-items:center;justify-content:center;font-family:var(--fm);font-size:.62rem;font-weight:700;cursor:pointer;transition:all .18s;}
.p-btn:hover{transform:scale(1.1);}
.p-btn.current{box-shadow:0 0 0 2px var(--forest),0 0 0 3px rgba(26,38,24,.1);}
.p-not-visited{background:#f0f0f0;border-color:#ccc;color:#999;}
.p-answered{background:var(--sage);border-color:#4a7a3d;color:white;}
.p-not-answered{background:var(--rose);border-color:#a83535;color:white;}
.p-marked{background:var(--gold);border-color:#b8832a;color:white;}
.p-marked-answered{background:var(--purple);border-color:#6b4ba8;color:white;}
.pal-sum{background:var(--cream-w);border-top:1px solid var(--border);padding:8px 11px;flex-shrink:0;}
.pal-sum-row{display:flex;justify-content:space-around;margin-bottom:6px;}
.ps-item{text-align:center;}
.ps-n{font-family:var(--fd);font-size:.84rem;font-weight:800;color:var(--forest);}
.ps-l{font-size:.48rem;color:rgba(26,38,24,.28);text-transform:uppercase;letter-spacing:.04em;}
.ps-n.a{color:var(--sage);}.ps-n.n{color:var(--rose);}.ps-n.m{color:var(--gold);}
.pal-submit{width:100%;font-family:var(--fd);font-size:.72rem;font-weight:700;padding:8px;border-radius:8px;border:none;cursor:pointer;background:linear-gradient(135deg,var(--sage),#4a7a3d);color:white;margin-top:5px;}

.mo{position:fixed;inset:0;z-index:500;background:rgba(26,38,24,.65);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;padding:14px;}
.mo.open{display:flex;}
.mb{background:white;border-radius:17px;padding:22px;width:400px;max-width:95vw;box-shadow:0 20px 60px rgba(26,38,24,.18);animation:pop .22s cubic-bezier(.34,1.56,.64,1);}
@keyframes pop{from{transform:scale(.9);opacity:0;}to{transform:scale(1);opacity:1;}}
.mb-t{font-size:.94rem;font-weight:800;color:var(--forest);margin-bottom:3px;}
.mb-s{font-size:.7rem;color:rgba(26,38,24,.4);margin-bottom:13px;}
.mb-g{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-bottom:12px;}
.mb-c{background:var(--cream-w);border:1px solid var(--border);border-radius:9px;padding:10px 12px;}
.mb-cn{font-family:var(--fd);font-size:1.08rem;font-weight:800;margin-bottom:2px;}
.mb-cl{font-size:.54rem;font-weight:500;color:rgba(26,38,24,.34);text-transform:uppercase;letter-spacing:.05em;}
.mb-w{background:var(--rose-l);border:1px solid rgba(200,75,75,.16);border-radius:8px;padding:8px 11px;font-size:.68rem;color:var(--rose);margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.mb-row{display:flex;gap:7px;}
.mb-cc{flex:1;font-family:var(--fd);font-size:.72rem;font-weight:600;padding:9px;border-radius:8px;border:1.5px solid var(--bm);background:none;color:var(--forest-m);cursor:pointer;}
.mb-cc:hover{border-color:var(--sage);color:var(--sage);}
.mb-ok{flex:2;font-family:var(--fd);font-size:.74rem;font-weight:700;padding:9px;border-radius:8px;border:none;background:linear-gradient(135deg,var(--sage),#4a7a3d);color:white;cursor:pointer;}

.result-view{display:none;flex-direction:column;height:100vh;overflow-y:auto;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.fade{animation:fadeIn .3s ease;}

@media(max-width:860px){
  .right-strip{display:none;}
  .q-scroll{padding:10px 12px;}
  .pal-drawer{width:88vw;}
  .tb-test{display:none;}
  .tsj{padding:3px 7px;font-size:.6rem;}
  .fn-btn{font-size:.66rem;padding:7px 10px;}
}

/* Q HEADER */
.q-header{background:white;border:1px solid var(--border);border-radius:12px;padding:12px 16px;margin-bottom:12px;display:flex;align-items:center;gap:10px;box-shadow:0 1px 4px rgba(26,38,24,.04);}
.q-num-badge{display:flex;align-items:center;gap:8px;}
.q-num{width:36px;height:36px;border-radius:9px;background:var(--forest);color:white;display:flex;align-items:center;justify-content:center;font-family:var(--fm);font-size:.78rem;font-weight:600;flex-shrink:0;}
.q-type-info{display:flex;flex-direction:column;gap:3px;}
.q-type-badge{font-size:.6rem;font-weight:700;padding:2px 9px;border-radius:100px;}
.qt-single{background:var(--sky-l);color:var(--sky);border:1px solid rgba(59,130,196,.2);}
.qt-multi{background:var(--pur-l);color:var(--purple);border:1px solid rgba(124,92,191,.2);}
.qt-integer{background:var(--amb-l);color:var(--amber);border:1px solid rgba(184,115,51,.2);}
.q-marks-info{font-size:.6rem;color:rgba(26,38,24,.35);display:flex;gap:7px;}
.marks-correct,.marks-pos{color:var(--sage);font-weight:700;}
.marks-wrong,.marks-neg{color:var(--rose);font-weight:700;}
.q-actions{margin-left:auto;display:flex;gap:5px;}
.q-action-btn{width:28px;height:28px;border-radius:7px;border:1.5px solid var(--bm);background:var(--cream-w);cursor:pointer;font-size:.7rem;display:flex;align-items:center;justify-content:center;transition:all .18s;}
.q-action-btn:hover{border-color:var(--sage);background:var(--sage-l);}
.q-action-btn.bookmarked{background:var(--gold-d);border-color:rgba(200,150,42,.3);}
/* Q TEXT */
.q-text-block{background:white;border:1px solid var(--border);border-radius:14px;padding:18px 22px;margin-bottom:12px;box-shadow:0 1px 4px rgba(26,38,24,.03);}
.q-subject-tag{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;display:flex;align-items:center;gap:5px;}
.qt-phy{color:var(--sky);}.qt-chem{color:var(--sage);}.qt-math{color:var(--gold);}.qt-bio{color:var(--purple);}
.q-text{font-family:var(--fs);font-size:1.02rem;color:var(--forest);line-height:1.86;}
/* OPTIONS */
.q-opts{display:flex;flex-direction:column;gap:9px;margin-bottom:12px;}
.opt{display:flex;align-items:center;gap:12px;padding:13px 16px;border-radius:12px;border:2px solid var(--bm);background:white;cursor:pointer;transition:all .2s;box-shadow:0 1px 3px rgba(26,38,24,.03);}
.opt:hover{border-color:var(--sage);background:var(--sage-l);transform:translateX(3px);}
.opt.selected{border-color:var(--sky);background:var(--sky-l);}
.opt.selected .opt-key{background:var(--sky);color:white;border-color:var(--sky);}
.opt.correct{border-color:var(--sage);background:rgba(107,143,94,.08);}
.opt.correct .opt-key{background:var(--sage);color:white;}
.opt.wrong{border-color:var(--rose);background:var(--rose-l);}
.opt.wrong .opt-key{background:var(--rose);color:white;}
.opt-key{width:34px;height:34px;border-radius:9px;border:2px solid var(--bm);background:var(--cream-w);display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:.76rem;font-weight:800;color:var(--forest-m);flex-shrink:0;transition:all .2s;}
.opt-text{font-size:.94rem;color:var(--forest);line-height:1.58;}
/* INTEGER */
.integer-input-wrap{display:flex;flex-direction:column;gap:8px;margin-bottom:12px;}
.integer-label{font-size:.7rem;font-weight:600;color:var(--forest-m);}
.integer-input,.int-input{font-family:var(--fm);font-size:1.4rem;font-weight:700;color:var(--forest);background:white;border:2px solid var(--bm);border-radius:12px;padding:12px 18px;outline:none;width:175px;text-align:center;transition:all .2s;}
.integer-input:focus,.int-input:focus{border-color:var(--sage);box-shadow:0 0 0 3px var(--sage-l);}
.calc-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;width:175px;}
.calc-btn{font-family:var(--fm);font-size:.82rem;font-weight:600;padding:9px;border-radius:8px;border:1.5px solid var(--bm);background:white;color:var(--forest);cursor:pointer;transition:all .18s;text-align:center;}
.calc-btn:hover{border-color:var(--sage);background:var(--sage-l);}
.calc-btn.special{background:var(--forest);color:white;border-color:var(--forest);}
.multi-note{font-size:.68rem;color:var(--purple);background:var(--pur-l);border:1px solid rgba(124,92,191,.18);border-radius:8px;padding:7px 12px;margin-bottom:10px;}
</style>
<style>
/* ═══ PALETTE LAYOUT ═══ */

  .right-strip{display:none!important;}
  .pal-overlay{display:none!important;position:static!important;}
  .pal-drawer{
    position:static!important;right:auto!important;top:auto!important;
    width:220px!important;height:auto!important;flex-shrink:0!important;
    display:flex!important;flex-direction:column!important;
    overflow:hidden!important;box-shadow:none!important;
    border-left:1px solid rgba(26,38,24,.08)!important;transition:none!important;z-index:1!important;
  }
  .pal-close{display:none!important;}
  .pal-scroll{flex:1!important;overflow-y:auto!important;}
  .palette-grid{display:grid!important;grid-template-columns:repeat(5,1fr)!important;gap:4px!important;}

/* Mobile palette strip */
#mob-palette-strip{
  display:none;flex-direction:column;background:white;
  border-top:2px solid rgba(26,38,24,.08);flex-shrink:0;
}
.mob-pal-hdr{background:#1a2618;padding:6px 14px;display:flex;align-items:center;justify-content:space-between;}
.mob-pal-title{font-size:.7rem;font-weight:700;color:white;}
.mob-pal-timer{font-family:'IBM Plex Mono',monospace;font-size:.82rem;color:white;font-weight:600;}
.mob-pal-legend{padding:5px 12px;display:flex;flex-wrap:wrap;gap:8px;border-bottom:1px solid rgba(26,38,24,.06);}
.mob-pal-leg{display:flex;align-items:center;gap:3px;font-size:.55rem;color:#3d5239;}
.mob-pal-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;}
.mob-pal-scroll{overflow-x:auto;overflow-y:hidden;padding:7px 12px;max-height:72px;}
.mob-pal-scroll::-webkit-scrollbar{height:3px;}
.mob-pal-scroll::-webkit-scrollbar-thumb{background:rgba(26,38,24,.13);border-radius:3px;}

<div id="test-interface" style="display:flex;flex-direction:column;height:100vh;">
<div class="topbar">

    <div class="tb-mark">MA</div><span class="tb-n1">Mock</span><span class="tb-n2">Arena</span>
  </a>
  <div class="tb-pipe"></div>
  <span class="tb-test">JEE Advanced · Full Mock #15</span>
  <div class="tb-subjs" id="subj-tabs"><button class="tsj phy on" onclick="switchSubject(0,this)">⚛️ Physics</button><button class="tsj che" onclick="switchSubject(1,this)">🧪 Chemistry</button><button class="tsj mat" onclick="switchSubject(2,this)">📐 Maths</button></div>

    <div class="tb-timer" id="timer-box">
      <span class="tb-tv" id="timer">03:00:00</span>
      <span class="tb-tl">Remaining</span>
    </div>
    <button class="tb-btn tb-instr" onclick="toggleInstructions()">📋</button>
    <button class="tb-btn tb-submit" onclick="openSubmit()">Submit</button>
    <span class="tb-user" id="user-name-display"></span>
    <div class="tb-av" id="user-av-display">S</div>
  </div>
</div>
<div class="sec-bar">
  <span class="sec-lbl">Section:</span>
  <div id="section-tabs" style="display:flex;gap:5px;"></div>
  <span class="sec-inf" id="sec-info"></span>
</div>
<div class="prog"><div class="prog-f" id="q-progress"></div></div>
<div class="body-wrap">
  <div class="q-area">
    <div class="q-scroll"><div id="q-body"></div></div>
    <div class="q-footer">
      <button class="fn-btn fn-mark" id="mark-btn" onclick="toggleMark()">🔖 Mark for Review</button>
      <button class="fn-btn fn-clear" onclick="clearAnswer()">✕ Clear</button>
      <button class="fn-btn fn-save" onclick="navigate(1)">Save &amp; Next ✓</button>
      <div class="fn-sp"></div>
      <span class="fn-ctr" id="q-counter"></span>
      <button class="fn-btn fn-prev" onclick="navigate(-1)">← Back</button>
      <button class="fn-btn fn-next" onclick="navigate(1)">Next →</button>
    </div>
  </div>
  <div class="right-strip">
    <div class="rs-btn rs-on" onclick="openPalette()"><span>🗂</span><span class="rs-lbl">Palette</span></div>
    <div class="rs-div"></div>
    <div class="rs-btn" onclick="toggleInstructions()"><span>📋</span><span class="rs-lbl">Guide</span></div>
    <div class="rs-btn" onclick="toggleHint()"><span>💡</span><span class="rs-lbl">Hint</span></div>
    <div class="rs-btn" onclick="reportQ()"><span>⚠️</span><span class="rs-lbl">Report</span></div>
    <div class="rs-div"></div>
    <div class="rs-btn" onclick="navigate(-1)"><span>←</span><span class="rs-lbl">Prev</span></div>
    <div class="rs-btn" onclick="navigate(1)"><span>→</span><span class="rs-lbl">Next</span></div>
    <div class="rs-div"></div>
    <div class="rs-btn rs-danger" onclick="openSubmit()"><span>✓</span><span class="rs-lbl">Submit</span></div>
  </div>
</div>
</div>
<div class="pal-overlay" id="pal-overlay" onclick="closePalette()"></div>
<div class="pal-drawer" id="pal-drawer">
  <div class="pal-hdr"><span class="pal-title">🗂 Question Palette</span><button class="pal-close" onclick="closePalette()">✕</button></div>
  <div class="pal-legend">
    <div class="pal-leg-grid">
      <div class="pal-leg-item"><div class="pal-leg-dot lg-a">✓</div>Answered</div>
      <div class="pal-leg-item"><div class="pal-leg-dot lg-n">!</div>Not Answered</div>
      <div class="pal-leg-item"><div class="pal-leg-dot lg-v">—</div>Not Visited</div>
      <div class="pal-leg-item"><div class="pal-leg-dot lg-m">★</div>Marked</div>
      <div class="pal-leg-item"><div class="pal-leg-dot lg-ma">✓</div>Marked+Ans</div>
    </div>
  </div>
  <div class="pal-scroll" id="palette"></div>
  <div class="pal-sum">
    <div class="pal-sum-row">
      <div class="ps-item"><div class="ps-n a" id="sum-answered">0</div><div class="ps-l">Ans</div></div>
      <div class="ps-item"><div class="ps-n n" id="sum-not-ans">0</div><div class="ps-l">Not Ans</div></div>
      <div class="ps-item"><div class="ps-n m" id="sum-marked">0</div><div class="ps-l">Marked</div></div>
      <div class="ps-item"><div class="ps-n" id="sum-not-vis">0</div><div class="ps-l">Not Vis</div></div>
    </div>
    <button class="pal-submit" onclick="closePalette();openSubmit();">✓ Submit Test</button>
  </div>
</div>
<div class="mo" id="submit-modal">
  <div class="mb">
    <div class="mb-t">Submit Test?</div>
    <div class="mb-s">JEE Advanced · Full Mock #15 · <span id="modal-time" style="font-family:var(--fm);color:var(--sage);font-weight:700;">--:--</span> remaining</div>
    <div class="mb-g" id="modal-stats"></div>
    <div class="mb-w" id="modal-warn"></div>
    <div class="mb-row">
      <button class="mb-cc" onclick="closeSubmit()">← Continue</button>

</div>

<script>

const SUBJECTS = [

   sections:[

  {name:'Mathematics',icon:'📐',color:'var(--gold)',cls:'qt-math',

    {name:'Section B',type:'multi',marks:'+4 / 0',qCount:5},
    {name:'Section C',type:'integer',marks:'+4 / 0',qCount:5},
   ]},

const QUESTIONS = [
  // ═══ PHYSICS ═══
  // Section A — Single Correct
  {subj:0,sec:0,id:1,text:'A particle moves in a circle of radius R with uniform speed v. The magnitude of change in velocity when the particle completes half a revolution is:',opts:['v','2v','πv','√2 v'],ans:1,
   hint:'Change in velocity = final velocity − initial velocity. At half revolution, velocities are in opposite directions.'},
  {subj:0,sec:0,id:2,text:'A body of mass m is placed on a rough inclined plane making angle θ with horizontal. The minimum force required to move the body up the plane (μ = coefficient of friction) is:',opts:['mg(sin θ + μcos θ)','mg(sin θ − μcos θ)','mg(cos θ + μsin θ)','mg(cos θ − μsin θ)'],ans:0,
   hint:'Force required = component along plane (upward) + friction force (opposing upward motion)'},
  {subj:0,sec:0,id:3,text:'The electric field at the centre of a uniformly charged ring of radius R and total charge Q is:',opts:['kQ/R²','Zero','kQ/2R²','2kQ/R²'],ans:1,
   hint:'By symmetry, the electric field contributions from opposite elements of the ring cancel out at the centre.'},
  {subj:0,sec:0,id:4,text:'A parallel plate capacitor with air gap has capacitance C. When a dielectric slab of dielectric constant K fills half the gap (parallel to plates), the new capacitance is:',opts:['KC/2','(1+K)C/2','2KC/(1+K)','C(K+1)'],ans:1,
   hint:'Two capacitors in series: one with air (C/2) and one with dielectric (KC/2). Apply series formula.'},
  {subj:0,sec:0,id:5,text:'In Young\'s double slit experiment, when one slit is covered with a red filter and other with blue filter, the interference pattern shows:',opts:['Red and blue fringes alternately','Only red fringes','Only blue fringes','No interference pattern'],ans:3,
   hint:'Interference requires coherent light of same wavelength. Red and blue light cannot interfere with each other.'},
  {subj:0,sec:0,id:6,text:'The de Broglie wavelength of an electron accelerated through potential V is proportional to:',opts:['V','1/V','1/√V','√V'],ans:2,

  {subj:0,sec:0,id:7,text:'A thermodynamic process is shown on a P-V diagram as a horizontal line. This represents:',opts:['Isothermal process','Adiabatic process','Isobaric process','Isochoric process'],ans:2,
   hint:'A horizontal line on P-V diagram means pressure is constant throughout the process.'},
  {subj:0,sec:0,id:8,text:'The binding energy per nucleon is maximum for:',opts:['Hydrogen','Iron (Fe-56)','Uranium','Carbon'],ans:1,
   hint:'Iron-56 has the highest binding energy per nucleon (~8.8 MeV/nucleon), making it the most stable nucleus.'},
  {subj:0,sec:0,id:9,text:'A convex lens of focal length 20 cm forms a real image of an object. If the object is placed at 30 cm from the lens, the image distance is:',opts:['60 cm','30 cm','20 cm','45 cm'],ans:0,
   hint:'Use lens formula: 1/v − 1/u = 1/f. u = −30 cm, f = +20 cm. Solve for v.'},
  {subj:0,sec:0,id:10,text:'In a series LCR circuit at resonance, the impedance is:',opts:['Maximum','Minimum and equal to R','Zero','Equal to X_L'],ans:1,

  // Section B — Multi Correct
  {subj:0,sec:1,id:11,text:'A magnetic field B⃗ exists in a region. Which of the following statements about a moving charged particle in this field are correct?',opts:['The speed of the particle remains constant','The kinetic energy of the particle remains constant','The particle moves in a circle if velocity ⊥ B⃗','The magnetic force does positive work on the particle'],ans:[0,1,2],multi:true,

  {subj:0,sec:1,id:12,text:'For a wave y = A sin(kx − ωt), which of the following are correct?',opts:['Wave speed = ω/k','Wavelength = 2π/k','The wave travels in positive x direction','Phase velocity = k/ω'],ans:[0,1,2],multi:true},
  {subj:0,sec:1,id:13,text:'In photoelectric effect, which factors affect the maximum kinetic energy of emitted electrons?',opts:['Intensity of incident light','Frequency of incident light','Work function of the metal','Nature of the metal surface'],ans:[1,2,3],multi:true},

  {subj:0,sec:1,id:15,text:'For a convex mirror, which images are possible?',opts:['Virtual and erect','Diminished','On same side as object','Always behind the mirror'],ans:[0,1,3],multi:true},
  // Section C — Integer type
  {subj:0,sec:2,id:16,text:'A ball is thrown vertically upward with speed 20 m/s. The height (in metres) at which its speed becomes half the initial speed is: (g = 10 m/s²)',type:'integer',ans:'15'},
  {subj:0,sec:2,id:17,text:'In a series circuit, R = 10Ω, X_L = 20Ω, X_C = 10Ω. The power factor of the circuit is (×10⁻¹):',type:'integer',ans:'7'},
  {subj:0,sec:2,id:18,text:'An electron in hydrogen atom transitions from n=4 to n=2. The wavelength of emitted photon (in Å) divided by 100 is approximately:',type:'integer',ans:'5'},

  {subj:1,sec:2,id:39,text:'In an FCC unit cell, the number of atoms per unit cell is:',type:'integer',ans:'4'},
  {subj:1,sec:2,id:40,text:'The oxidation state of Mn in KMnO₄ is:',type:'integer',ans:'7'},

  // ═══ MATHEMATICS ═══
  {subj:2,sec:0,id:41,text:'If f(x) = x² − 3x + 2, then the value of f(f(x)) at x = 0 is:',opts:['0','2','6','12'],ans:2,hint:'f(0) = 0 − 0 + 2 = 2. f(f(0)) = f(2) = 4 − 6 + 2 = 0. Wait — f(2) = 4−6+2 = 0, not 6. Let me check... f(0)=2, f(2)=4−6+2=0. So answer is 0.'},
  {subj:2,sec:0,id:42,text:'The value of ∫₀^(π/2) sin²x dx is:',opts:['π/2','π/4','1/2','π/3'],ans:1,hint:'∫₀^(π/2) sin²x dx = ∫₀^(π/2) (1−cos2x)/2 dx = [x/2 − sin2x/4]₀^(π/2) = π/4'},
  {subj:2,sec:0,id:43,text:'The number of real roots of the equation x² + 5|x| + 6 = 0 is:',opts:['0','2','4','1'],ans:0,hint:'For x≥0: x²+5x+6=0 → (x+2)(x+3)=0 → x=−2 or −3. Both negative, not valid. For x<0: x²−5x+6=0 → (x−2)(x−3)=0 → x=2 or 3, but these are positive, not valid for x<0. Zero real roots.'},

let timeLeft = totalTime;

let currentQIdx = 0; // index within current subj+sec

// State per question
const qState = {}; // key: q.id → {visited, answered, marked, answer}
QUESTIONS.forEach(q => {
  qState[q.id] = {visited:false, answered:false, marked:false, answer:q.type==='integer'?'':null};
});

function getQuestionsFor(subj, sec){
  return QUESTIONS.filter(q => q.subj===subj && q.sec===sec);
}

function getCurrentQ(){
  const qs = getQuestionsFor(currentSubj, currentSec);
  return qs[currentQIdx] || null;
}

function getGlobalIdx(){
  let idx = 0;
  for(let s=0;s<currentSubj;s++) idx += SUBJECTS[s].sections.reduce((a,b)=>a+b.qCount,0);
  for(let sc=0;sc<currentSec;sc++) idx += SUBJECTS[currentSubj].sections[sc].qCount;
  idx += currentQIdx;
  return idx;
}

// ════ RENDER ════
function renderSectionTabs(){
  const tabs = document.getElementById('section-tabs');
  const secs = SUBJECTS[currentSubj].sections;
  tabs.innerHTML = secs.map((s,i)=>`
    <button class="sec-tab ${i===currentSec?'active':''}" onclick="switchSection(${i})">${s.name} (${s.type==='single'?'MCQ':s.type==='multi'?'MSQ':'Int.'})</button>
  `).join('');
  const qs = getQuestionsFor(currentSubj, currentSec);
  document.getElementById('sec-info').textContent = `Q ${currentQIdx+1} of ${qs.length}`;
}

function renderQuestion(){
  const q = getCurrentQ();
  if(!q) return;
  const st = qState[q.id];
  st.visited = true;

  const subj = SUBJECTS[q.subj];
  const sec = subj.sections[q.sec];
  const qs = getQuestionsFor(currentSubj, currentSec);
  const totalQs = QUESTIONS.length;
  const answeredCount = QUESTIONS.filter(qq=>qState[qq.id].answered).length;

  // Progress
  document.getElementById('q-progress').style.width = `${(answeredCount/totalQs)*100}%`;
  document.getElementById('q-counter').textContent = `Q${getGlobalIdx()+1} / ${totalQs}`;
  document.getElementById('sec-info').textContent = `Q ${currentQIdx+1} of ${qs.length}`;

  // Mark button
  const markBtn = document.getElementById('mark-btn');
  markBtn.classList.toggle('marked', st.marked);
  markBtn.textContent = st.marked ? '🔖 Marked for Review' : '🔖 Mark for Review';

  // Type badge
  const typeName = q.multi?'Multi Correct':q.type==='integer'?'Integer Type':sec.type==='single'?'Single Correct':'Single Correct';
  const typeClass = q.multi?'qt-multi':q.type==='integer'?'qt-integer':'qt-single';

  let optsHtml = '';
  if(q.type === 'integer'){
    optsHtml = `
    <div class="integer-input-wrap">
      <div class="integer-label">Enter your answer (integer value):</div>
      <input type="number" class="integer-input" id="int-input" value="${st.answer||''}" placeholder="0" oninput="saveInteger(this.value)">
      <div class="calc-pad">
        ${[7,8,9,4,5,6,1,2,3].map(n=>`<button class="calc-btn" onclick="appendDigit('${n}')">${n}</button>`).join('')}
        <button class="calc-btn" onclick="appendDigit('0')">0</button>
        <button class="calc-btn" onclick="appendDigit('-')">−</button>
        <button class="calc-btn special" onclick="clearInt()">✕</button>
      </div>
    </div>`;
  } else {
    optsHtml = `<div class="q-opts">
      ${q.opts.map((opt,i)=>{
        let cls = '';
        if(q.multi){
          if(st.answer && st.answer.includes(i)) cls = 'selected';
        } else {
          if(st.answer === i) cls = 'selected';
        }
        return `<div class="opt ${cls}" onclick="selectOpt(${i})">
          <div class="opt-key">${['A','B','C','D'][i]}</div>
          <div class="opt-text">${opt}</div>
        </div>`;
      }).join('')}
    </div>`;
  }

  document.getElementById('q-body').innerHTML = `
    <div class="q-header">
      <div class="q-num-badge">
        <div class="q-num">Q${getGlobalIdx()+1}</div>
        <div class="q-type-info">
          <span class="q-type-badge ${typeClass}">${typeName}</span>
          <div class="q-marks-info">
            <span class="marks-correct">${sec.marks.split('/')[0].trim()} correct</span>
            <span class="marks-wrong">${sec.marks.split('/')[1].trim()} wrong</span>
          </div>
        </div>
      </div>
      <div class="q-actions">
        <button class="q-action-btn ${st.marked?'bookmarked':''}" onclick="toggleMark()" title="Bookmark">🔖</button>
        <button class="q-action-btn" onclick="alert('Hint: ${q.hint||'Think carefully about the concept.'}')" title="Hint">💡</button>
        <button class="q-action-btn" onclick="alert('Report issue submitted!')" title="Report">⚑</button>
      </div>
    </div>
    <div class="q-text-block">
      <div class="q-subject-tag ${subj.cls}">${subj.icon} ${subj.name} · ${sec.name}</div>
      <div class="q-text">${q.text}</div>
    </div>
    ${optsHtml}
    ${q.multi?'<div style="font-size:.72rem;color:rgba(26,38,24,.45);background:var(--purple-light);border:1px solid rgba(124,92,191,.2);border-radius:8px;padding:8px 12px;margin-bottom:16px;">ℹ️ One or more options may be correct. Select all that apply.</div>':''}
  `;

  renderPalette();
  updateSummary();
}

function selectOpt(i){
  const q = getCurrentQ();
  if(!q) return;
  const st = qState[q.id];

  if(q.multi){
    if(!Array.isArray(st.answer)) st.answer = [];
    if(st.answer.includes(i)) st.answer = st.answer.filter(x=>x!==i);
    else st.answer.push(i);
    st.answered = st.answer.length > 0;
  } else {
    st.answer = i;
    st.answered = true;
  }
  renderQuestion();
}

function saveInteger(val){
  const q = getCurrentQ();
  if(!q) return;
  qState[q.id].answer = val;
  qState[q.id].answered = val !== '' && val !== null;
  updateSummary();
  renderPalette();
}

function appendDigit(d){
  const inp = document.getElementById('int-input');
  if(!inp) return;
  if(d==='-') inp.value = inp.value.startsWith('-') ? inp.value.slice(1) : '-'+inp.value;
  else inp.value = inp.value + d;
  saveInteger(inp.value);
}

function clearInt(){
  const inp = document.getElementById('int-input');
  if(inp){ inp.value=''; saveInteger(''); }
}

function clearAnswer(){
  const q = getCurrentQ();
  if(!q) return;
  const st = qState[q.id];
  st.answer = q.type==='integer' ? '' : null;
  st.answered = false;
  st.marked = false;
  renderQuestion();
}

function toggleMark(){
  const q = getCurrentQ();
  if(!q) return;
  qState[q.id].marked = !qState[q.id].marked;
  renderQuestion();
}

function navigate(dir){
  const qs = getQuestionsFor(currentSubj, currentSec);
  const newIdx = currentQIdx + dir;

  if(newIdx >= 0 && newIdx < qs.length){
    currentQIdx = newIdx;
  } else if(dir > 0){
    // Move to next section or subject
    const secs = SUBJECTS[currentSubj].sections;
    if(currentSec < secs.length - 1){
      currentSec++;
      currentQIdx = 0;
    } else if(currentSubj < SUBJECTS.length - 1){
      currentSubj++;
      currentSec = 0;
      currentQIdx = 0;
      updateSubjTabs();
    }
  } else {
    // Move to prev section or subject
    if(currentSec > 0){
      currentSec--;
      currentQIdx = getQuestionsFor(currentSubj,currentSec).length - 1;
    } else if(currentSubj > 0){
      currentSubj--;
      currentSec = SUBJECTS[currentSubj].sections.length - 1;
      currentQIdx = getQuestionsFor(currentSubj,currentSec).length - 1;
      updateSubjTabs();
    }
  }
  renderSectionTabs();
  renderQuestion();
}

function switchSubject(idx, el){
  currentSubj = idx;
  currentSec = 0;
  currentQIdx = 0;
  updateSubjTabs();
  renderSectionTabs();
  renderQuestion();
}

function updateSubjTabs(){
  document.querySelectorAll('.subj-tab').forEach((t,i)=>{
    t.classList.toggle('active', i===currentSubj);
  });
}

function switchSection(idx){
  currentSec = idx;
  currentQIdx = 0;
  renderSectionTabs();
  renderQuestion();
}

function jumpToQ(subj, sec, idx){
  currentSubj = subj;
  currentSec = sec;
  currentQIdx = idx;
  updateSubjTabs();
  renderSectionTabs();
  renderQuestion();
}

// ════ PALETTE ════
function renderPalette(){
  const palette = document.getElementById('palette');
  let html = '';
  const q = getCurrentQ();

  SUBJECTS.forEach((subj, si) => {
    html += `<div class="palette-subj-label">${subj.icon} ${subj.name}</div>`;
    subj.sections.forEach((sec,sci) => {
      const qs = getQuestionsFor(si, sci);
      if(qs.length === 0) return;
      html += `<div style="font-size:.6rem;color:rgba(26,38,24,.35);margin-bottom:5px;">${sec.name}</div>`;
      html += '<div class="palette-grid">';
      qs.forEach((qq, qi) => {
        const st = qState[qq.id];
        const isCurrent = qq.id === (q?q.id:0);
        let cls = 'p-not-visited';
        if(st.answered && st.marked) cls = 'p-marked-answered';
        else if(st.answered) cls = 'p-answered';
        else if(st.marked) cls = 'p-marked';
        else if(st.visited) cls = 'p-not-answered';
        const globalN = getGlobalQNum(si, sci, qi);
        html += `<button class="p-btn ${cls} ${isCurrent?'current':''}" onclick="jumpToQ(${si},${sci},${qi})" title="Q${globalN}">${globalN}</button>`;
      });
      html += '</div>';
    });
  });
  palette.innerHTML = html;
}

function getGlobalQNum(si, sci, qi){
  let n = 1;
  for(let s=0;s<si;s++) n += SUBJECTS[s].sections.reduce((a,b)=>a+b.qCount,0);
  for(let sc=0;sc<sci;sc++) n += SUBJECTS[si].sections[sc].qCount;
  n += qi;
  return n;
}

function updateSummary(){
  const answered = QUESTIONS.filter(q=>qState[q.id].answered && !qState[q.id].marked).length;
  const notAns = QUESTIONS.filter(q=>qState[q.id].visited && !qState[q.id].answered && !qState[q.id].marked).length;
  const marked = QUESTIONS.filter(q=>qState[q.id].marked && !qState[q.id].answered).length;
  const markedAns = QUESTIONS.filter(q=>qState[q.id].marked && qState[q.id].answered).length;
  const notVis = QUESTIONS.filter(q=>!qState[q.id].visited).length;

  document.getElementById('sum-answered').textContent = answered + markedAns;
  document.getElementById('sum-not-ans').textContent = notAns;
  document.getElementById('sum-marked').textContent = marked;
  document.getElementById('sum-not-vis').textContent = notVis;
}

// ════ TIMER ════
function formatTime(s){
  const h=Math.floor(s/3600), m=Math.floor((s%3600)/60), sec=s%60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

const timerInterval = setInterval(()=>{
  if(timeLeft <= 0){ clearInterval(timerInterval); autoSubmit(); return; }
  timeLeft--;
  document.getElementById('timer').textContent = formatTime(timeLeft);
  const box = document.getElementById('timer-box');
  if(timeLeft <= 300){ box.className='timer-box danger'; }
  else if(timeLeft <= 900){ box.className='timer-box warning'; }
}, 1000);

function autoSubmit(){
  alert('Time is up! Submitting your test automatically...');
  submitTest();
}

// ════ SUBMIT ════
function openSubmit(){
  const answered = QUESTIONS.filter(q=>qState[q.id].answered).length;
  const notAns = QUESTIONS.filter(q=>qState[q.id].visited && !qState[q.id].answered).length;
  const marked = QUESTIONS.filter(q=>qState[q.id].marked).length;
  const notVis = QUESTIONS.filter(q=>!qState[q.id].visited).length;

  document.getElementById('modal-time').textContent = formatTime(timeLeft);
  document.getElementById('modal-stats').innerHTML = `
    <div class="mb-stat"><div class="mb-stat-n" style="color:var(--sage)">${answered}</div><div class="mb-stat-l">Answered</div></div>
    <div class="mb-stat"><div class="mb-stat-n" style="color:var(--rose)">${notAns}</div><div class="mb-stat-l">Not Answered</div></div>
    <div class="mb-stat"><div class="mb-stat-n" style="color:var(--gold)">${marked}</div><div class="mb-stat-l">Marked</div></div>
    <div class="mb-stat"><div class="mb-stat-n" style="color:rgba(26,38,24,.35)">${notVis}</div><div class="mb-stat-l">Not Visited</div></div>
  `;
  document.getElementById('modal-warn').innerHTML = notVis > 0
    ? `⚠️ You have <strong>${notVis} questions not visited</strong>. Make sure you haven't missed any section.`
    : answered < QUESTIONS.length
    ? `⚠️ <strong>${QUESTIONS.length - answered} questions unanswered</strong>. Unanswered questions get 0 marks.`
    : `✅ All ${QUESTIONS.length} questions answered. Great job!`;
  document.getElementById('submit-modal').classList.add('open');
}

function closeSubmit(){
  document.getElementById('submit-modal').classList.remove('open');
}

function submitTest(){
  clearInterval(timerInterval);
  closeSubmit();

  // Calculate score
  let score = 0, correct = 0, wrong = 0, skipped = 0;
  QUESTIONS.forEach(q => {
    const st = qState[q.id];
    const subj = SUBJECTS[q.subj];
    const sec = subj.sections[q.sec];
    const marks = parseInt(sec.marks.split('/')[0]);
    const negative = parseInt(sec.marks.split('/')[1]);

    if(!st.answered){ skipped++; return; }
    if(q.multi){
      const correctSet = new Set(q.ans);
      const selectedSet = new Set(st.answer);
      const isFullyCorrect = correctSet.size === selectedSet.size && [...correctSet].every(x=>selectedSet.has(x));
      if(isFullyCorrect){ score += marks; correct++; }
      else { score += negative; wrong++; }
    } else if(q.type === 'integer'){
      if(String(st.answer).trim() === String(q.ans)){ score += marks; correct++; }
      else { skipped++; }
    } else {
      if(st.answer === q.ans){ score += marks; correct++; }
      else { score += negative; wrong++; }
    }
  });

  const pct = Math.round((correct/QUESTIONS.length)*100);
  const timeTaken = totalTime - timeLeft;
  const th = Math.floor(timeTaken/3600), tm = Math.floor((timeTaken%3600)/60);

    <div style="position:absolute;width:300px;height:300px;border-radius:50%;background:rgba(107,143,94,.15);filter:blur(60px);top:-60px;right:60px;pointer-events:none;"></div>
    <div style="max-width:900px;margin:0 auto;position:relative;z-index:1;">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;text-decoration:none;" onclick="window.location.href='mockarena_dashboard.html'">
        <div style="width:32px;height:32px;background:linear-gradient(135deg,var(--sage),#4a7a3d);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:.76rem;font-weight:800;color:white;">MA</div>
        <span style="font-family:var(--font-d);font-size:.95rem;font-weight:900;color:white;">Mock</span><span style="font-family:var(--font-d);font-size:.95rem;font-weight:900;background:linear-gradient(135deg,#818cf8,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">Arena</span>
      </div>
      <div style="font-size:.68rem;font-weight:600;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;">JEE Advanced Full Mock #15 · Result</div>
      <div style="font-family:var(--font-d);font-size:1.6rem;font-weight:900;color:white;letter-spacing:-.04em;margin-bottom:6px;">
        ${score >= 180 ? '🏆 Excellent Performance!' : score >= 120 ? '👍 Good Attempt!' : score >= 60 ? '📈 Keep Improving!' : '💪 Never Give Up!'}
      </div>
      <div style="font-size:.82rem;color:rgba(255,255,255,.45);">Time taken: ${th}h ${tm}m · ${QUESTIONS.length} Questions · PCM</div>
    </div>
  </div>

  <div style="max-width:900px;margin:0 auto;padding:28px 20px;width:100%;">

          <div style="font-size:.66rem;font-weight:600;color:rgba(26,38,24,.4);text-transform:uppercase;letter-spacing:.06em;margin-top:4px;">${l}</div>
        </div>`).join('')}
      </div>

      <!-- Accuracy bar -->
      <div style="margin-bottom:14px;">
        <div style="display:flex;justify-content:space-between;font-size:.76rem;font-weight:600;color:var(--forest-muted);margin-bottom:6px;">

            <div style="font-size:.7rem;color:rgba(26,38,24,.5);line-height:1.5;">${q.text.substring(0,100)}${q.text.length>100?'...':''}</div>
            ${!q.multi&&q.type!=='integer'?`<div style="font-size:.68rem;color:var(--sage);margin-top:3px;">✓ Correct: ${q.opts[q.ans]}</div>`:''}
            ${q.type==='integer'?`<div style="font-size:.68rem;color:var(--sage);margin-top:3px;">✓ Answer: ${q.ans}</div>`:''}

    <!-- Actions -->

      <button style="font-family:var(--font-d);font-size:.84rem;font-weight:700;padding:13px 24px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--sage),#4a7a3d);color:white;cursor:pointer;box-shadow:0 4px 14px var(--sage-glow);" onclick="window.location.href='mockarena_results.html'">📊 View Full Analysis →</button>
      <button style="font-family:var(--font-d);font-size:.84rem;font-weight:700;padding:13px 24px;border-radius:12px;border:1.5px solid var(--border-med);background:none;color:var(--forest-muted);cursor:pointer;" onclick="window.location.href='mockarena_dashboard.html'">⬡ Back to Dashboard</button>
      <button style="font-family:var(--font-d);font-size:.84rem;font-weight:700;padding:13px 24px;border-radius:12px;border:1.5px solid var(--border-med);background:none;color:var(--forest-muted);cursor:pointer;" onclick="location.reload()">↺ Reattempt Test</button>
    </div>
  </div>`;

<script>
(function(){
  function patchInput(){
    // Change integer inputs to text type
    document.querySelectorAll('input[type="number"]').forEach(function(inp){
      if(inp.id==='int-input'||inp.id==='ii'||inp.classList.contains('integer-input')||inp.classList.contains('int-input')){
        inp.type='text';
        inp.setAttribute('inputmode','decimal');
        inp.removeAttribute('step');
      }
    });
    // Patch appendDigit
    window.appendDigit=function(d){
      var inp=document.getElementById('int-input');
      if(!inp)return;
      var v=inp.value||'';
      if(d==='neg'){v=v.startsWith('-')?v.slice(1):(v?'-'+v:'-');}
      else if(d==='.'){if(!v.includes('.'))v=v+'.';}
      else if(d==='bs'){v=v.slice(0,-1);}
      else if(d==='clr'){v='';}
      else{v=v+d;}
      inp.value=v;
      if(typeof saveInteger==='function')saveInteger(v);
    };
    window.addDigit=function(d){
      var el=document.getElementById('ii');if(!el)return;
      var v=el.value||'';
      if(d==='neg'){v=v.startsWith('-')?v.slice(1):(v?'-'+v:'-');}
      else if(d==='.'){if(!v.includes('.'))v=v+'.';}
      else if(d==='bs'){v=v.slice(0,-1);}
      else if(d==='clr'){v='';}
      else{v=v+d;}
      el.value=v;
      if(typeof saveInt==='function')saveInt(v);
    };
  }
  if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',patchInput);}
  else{patchInput();}
})();
</script>
