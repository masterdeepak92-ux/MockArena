<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MockArena — JEE Main Mock #22</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=IBM+Plex+Mono:wght@300;400;500&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#faf9f5;--cream-warm:#f5f3ec;--cream-card:#ffffff;
  --forest:#1a2618;--forest-soft:#243422;--forest-muted:#3d5239;
  --sage:#6b8f5e;--sage-light:rgba(107,143,94,0.1);--sage-glow:rgba(107,143,94,0.22);
  --gold:#c8962a;--gold-dim:rgba(200,150,42,0.09);
  --rose:#c84b4b;--rose-light:rgba(200,75,75,0.09);
  --sky:#3b82c4;--sky-light:rgba(59,130,196,0.09);
  --amber:#b87333;--amber-light:rgba(184,115,51,0.09);
  --purple:#7c5cbf;--purple-light:rgba(124,92,191,0.09);
  --indigo:#4f46e5;--indigo-light:rgba(79,70,229,0.09);
  --border:rgba(26,38,24,0.08);--border-med:rgba(26,38,24,0.13);
  --font-d:'Outfit',sans-serif;--font-m:'IBM Plex Mono',monospace;--font-s:'Lora',serif;
  --sh:0 1px 3px rgba(26,38,24,0.06),0 4px 16px rgba(26,38,24,0.04);
  --sh-hover:0 8px 32px rgba(107,143,94,0.15),0 2px 8px rgba(26,38,24,0.06);
  --sh-deep:0 20px 60px rgba(26,38,24,0.12);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:var(--font-d);background:var(--cream);color:var(--forest);-webkit-font-smoothing:antialiased;}

/* TOP BAR */
.topbar{height:56px;background:var(--forest);display:flex;align-items:center;padding:0 20px;gap:16px;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,.06);z-index:100;}
.tb-logo{display:flex;align-items:center;gap:8px;text-decoration:none;}
.tb-lm{width:30px;height:30px;background:linear-gradient(135deg,var(--sage),#4a7a3d);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:800;color:white;}
.tb-brand{font-size:.9rem;font-weight:900;}
.tb-mock{color:white;}
.tb-arena{background:linear-gradient(135deg,#818cf8,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.tb-div{width:1px;height:18px;background:rgba(255,255,255,.15);}
.tb-name{font-size:.78rem;font-weight:600;color:rgba(255,255,255,.5);}
.tb-center{flex:1;display:flex;align-items:center;justify-content:center;}
.subj-tabs{display:flex;gap:3px;background:rgba(255,255,255,.06);border-radius:10px;padding:3px;}
.subj-tab{font-size:.72rem;font-weight:600;padding:5px 13px;border-radius:8px;border:none;cursor:pointer;transition:all .2s;color:rgba(255,255,255,.4);background:none;}
.subj-tab:hover{color:rgba(255,255,255,.8);}
.subj-tab.active{color:white;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.15);}
.subj-tab.phy.active{background:rgba(59,130,196,.3);border-color:rgba(59,130,196,.4);}
.subj-tab.chem.active{background:rgba(107,143,94,.3);border-color:rgba(107,143,94,.4);}
.subj-tab.math.active{background:rgba(200,150,42,.25);border-color:rgba(200,150,42,.35);}
.tb-right{display:flex;align-items:center;gap:10px;}
.timer-box{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:6px 14px;display:flex;align-items:center;gap:8px;}
.timer-box.warning{background:rgba(200,150,42,.15);border-color:rgba(200,150,42,.3);}
.timer-box.danger{background:rgba(200,75,75,.18);border-color:rgba(200,75,75,.35);animation:tpulse 1s infinite;}
@keyframes tpulse{0%,100%{opacity:1}50%{opacity:.7}}
.timer-val{font-family:var(--font-m);font-size:.92rem;font-weight:600;color:white;letter-spacing:.04em;}
.timer-lbl{font-size:.56rem;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.08em;}
.btn{font-family:var(--font-d);font-size:.76rem;font-weight:600;padding:7px 14px;border-radius:9px;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:5px;border:none;}
.btn-gl{background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.15);color:rgba(255,255,255,.75);}
.btn-gl:hover{background:rgba(255,255,255,.14);color:white;}
.btn-sub{background:linear-gradient(135deg,var(--sage),#4a7a3d);color:white;padding:8px 18px;box-shadow:0 2px 12px var(--sage-glow);}
.btn-sub:hover{box-shadow:0 4px 18px var(--sage-glow);transform:translateY(-1px);}

/* LAYOUT */
.layout{display:flex;height:calc(100vh - 56px);overflow:hidden;}

/* QUESTION PANEL */
.qp{flex:1;display:flex;flex-direction:column;overflow:hidden;border-right:1px solid var(--border);}
.sec-bar{background:var(--cream-warm);border-bottom:1px solid var(--border);padding:8px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
.sec-lbl{font-size:.72rem;font-weight:700;color:var(--forest-muted);text-transform:uppercase;letter-spacing:.06em;}
.sec-tabs{display:flex;gap:4px;}
.stab{font-size:.7rem;font-weight:600;padding:4px 12px;border-radius:7px;border:1.5px solid var(--border-med);background:var(--cream-warm);color:var(--forest-muted);cursor:pointer;transition:all .18s;}
.stab:hover{border-color:var(--sage);color:var(--sage);}
.stab.on{background:var(--forest);color:white;border-color:var(--forest);}
.q-prog{height:3px;background:var(--border);flex-shrink:0;}
.q-prog-fill{height:100%;background:linear-gradient(90deg,var(--indigo),var(--sage));transition:width .4s ease;}
.q-body{flex:1;overflow-y:auto;padding:22px;}
.q-body::-webkit-scrollbar{width:3px;}
.q-body::-webkit-scrollbar-thumb{background:var(--border-med);border-radius:3px;}

/* Question */
.q-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;gap:12px;}
.q-num-b{display:flex;align-items:center;gap:8px;}
.q-num{width:36px;height:36px;border-radius:9px;background:var(--forest);color:white;display:flex;align-items:center;justify-content:center;font-size:.82rem;font-weight:800;}
.q-type-b{font-size:.62rem;font-weight:700;padding:2px 8px;border-radius:100px;}
.qt-single{background:var(--sky-light);color:var(--sky);border:1px solid rgba(59,130,196,.2);}
.qt-integer{background:var(--amber-light);color:var(--amber);border:1px solid rgba(184,115,51,.2);}
.q-marks{font-size:.64rem;color:rgba(26,38,24,.4);display:flex;gap:10px;}
.mp{color:var(--sage);font-weight:600;}
.mn{color:var(--rose);font-weight:600;}
.q-acts{display:flex;gap:6px;}
.q-ab{width:30px;height:30px;border-radius:8px;border:1.5px solid var(--border-med);background:var(--cream-warm);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.8rem;transition:all .18s;}
.q-ab:hover{border-color:var(--sage);background:var(--sage-light);}
.q-ab.bm{background:var(--gold-dim);border-color:rgba(200,150,42,.3);}
.q-tb{background:white;border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:14px;}
.q-stag{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:9px;}
.qt-phy{color:var(--sky);}
.qt-chem{color:var(--sage);}
.qt-math{color:var(--gold);}
.q-txt{font-family:var(--font-s);font-size:.9rem;color:var(--forest);line-height:1.78;}
.q-txt .mf{font-family:var(--font-m);background:var(--cream-warm);padding:2px 7px;border-radius:5px;font-size:.86rem;border:1px solid var(--border);}

/* MCQ Options */
.q-opts{display:flex;flex-direction:column;gap:7px;margin-bottom:18px;}
.opt{display:flex;align-items:flex-start;gap:12px;padding:12px 15px;border-radius:11px;border:2px solid var(--border-med);background:white;cursor:pointer;transition:all .22s;}
.opt:hover{border-color:var(--indigo);background:var(--indigo-light);}
.opt.on{border-color:var(--sky);background:var(--sky-light);}
.opt.on .ok{background:var(--sky);color:white;border-color:var(--sky);}
.opt.correct{border-color:var(--sage);background:var(--sage-light);}
.opt.correct .ok{background:var(--sage);color:white;}
.opt.wrong{border-color:var(--rose);background:var(--rose-light);}
.opt.wrong .ok{background:var(--rose);color:white;}
.ok{width:28px;height:28px;border-radius:8px;border:2px solid var(--border-med);background:var(--cream-warm);display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:800;color:var(--forest-muted);flex-shrink:0;transition:all .22s;}
.ot{font-size:.84rem;color:var(--forest);line-height:1.5;padding-top:1px;}
.ot .mf{font-family:var(--font-m);background:var(--cream-warm);padding:1px 6px;border-radius:4px;font-size:.8rem;border:1px solid var(--border);}

/* Integer input */
.int-wrap{display:flex;flex-direction:column;gap:10px;margin-bottom:18px;}
.int-lbl{font-size:.76rem;font-weight:600;color:var(--forest-muted);}
.int-input{font-family:var(--font-m);font-size:1.2rem;font-weight:700;color:var(--forest);background:white;border:2px solid var(--border-med);border-radius:12px;padding:14px 18px;outline:none;width:180px;text-align:center;transition:all .22s;}
.int-input:focus{border-color:var(--sage);box-shadow:0 0 0 3px var(--sage-light);}
.calc-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;width:186px;}
.calc-btn{font-family:var(--font-m);font-size:.88rem;font-weight:600;padding:10px;border-radius:9px;border:1.5px solid var(--border-med);background:var(--cream-warm);color:var(--forest);cursor:pointer;transition:all .18s;text-align:center;}
.calc-btn:hover{border-color:var(--sage);background:var(--sage-light);}
.calc-btn.sp{background:var(--forest);color:white;border-color:var(--forest);}
.calc-btn.neg{background:var(--amber-light);border-color:rgba(184,115,51,.25);color:var(--amber);}

/* Footer */
.q-foot{background:var(--cream-warm);border-top:1px solid var(--border);padding:13px 20px;display:flex;align-items:center;gap:9px;flex-shrink:0;}
.q-mbtn{font-size:.76rem;font-weight:600;padding:8px 15px;border-radius:10px;border:1.5px solid rgba(200,150,42,.3);background:var(--gold-dim);color:var(--gold);cursor:pointer;transition:all .2s;}
.q-mbtn:hover{background:rgba(200,150,42,.15);}
.q-mbtn.marked{background:var(--gold);color:white;border-color:var(--gold);}
.q-cbtn{font-size:.76rem;font-weight:600;padding:8px 15px;border-radius:10px;border:1.5px solid var(--border-med);background:none;color:var(--forest-muted);cursor:pointer;transition:all .2s;}
.q-cbtn:hover{border-color:var(--rose);color:var(--rose);}
.q-sp{flex:1;}
.q-cnt{font-family:var(--font-m);font-size:.72rem;color:rgba(26,38,24,.4);}
.q-nav{font-size:.78rem;font-weight:600;padding:9px 18px;border-radius:10px;cursor:pointer;transition:all .2s;border:1.5px solid;display:flex;align-items:center;gap:6px;}
.q-prev{background:var(--cream-warm);border-color:var(--border-med);color:var(--forest-muted);}
.q-prev:hover{border-color:var(--sage);color:var(--sage);}
.q-next{background:linear-gradient(135deg,var(--forest),var(--forest-soft));color:white;border-color:transparent;}
.q-next:hover{box-shadow:var(--sh-hover);transform:translateY(-1px);}

/* PALETTE */
.pp{width:278px;flex-shrink:0;background:white;display:flex;flex-direction:column;overflow:hidden;}
.pp-hd{padding:13px 15px 9px;border-bottom:1px solid var(--border);flex-shrink:0;}
.pp-title{font-size:.8rem;font-weight:700;color:var(--forest);margin-bottom:9px;}
.legend{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
.li{display:flex;align-items:center;gap:5px;font-size:.64rem;color:var(--forest-muted);}
.ld{width:18px;height:18px;border-radius:5px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.56rem;font-weight:700;}
.la{background:var(--sage);color:white;}
.lna{background:var(--rose-light);color:var(--rose);border:1.5px solid rgba(200,75,75,.25);}
.lnv{background:var(--cream-warm);color:rgba(26,38,24,.4);border:1.5px solid var(--border-med);}
.lm{background:var(--gold);color:white;}
.lma{background:var(--purple);color:white;}
.pp-scroll{flex:1;overflow-y:auto;padding:10px 12px;}
.pp-scroll::-webkit-scrollbar{width:3px;}
.pp-scroll::-webkit-scrollbar-thumb{background:var(--border-med);border-radius:3px;}
.pp-slbl{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:rgba(26,38,24,.35);margin:10px 0 6px;display:flex;align-items:center;gap:6px;}
.pp-slbl::after{content:'';flex:1;height:1px;background:var(--border);}
.pp-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-bottom:3px;}
.pb{width:100%;aspect-ratio:1;border-radius:7px;border:2px solid;display:flex;align-items:center;justify-content:center;font-family:var(--font-m);font-size:.68rem;font-weight:600;cursor:pointer;transition:all .18s;}
.pb:hover{transform:scale(1.1);}
.pb.cur{box-shadow:0 0 0 2px var(--forest),0 0 0 4px rgba(26,38,24,.12);}
.pnv{background:var(--cream-warm);border-color:var(--border-med);color:rgba(26,38,24,.4);}
.pa{background:var(--sage);border-color:#4a7a3d;color:white;}
.pna{background:var(--rose-light);border-color:rgba(200,75,75,.35);color:var(--rose);}
.pm{background:var(--gold);border-color:#b8832a;color:white;}
.pma{background:var(--purple);border-color:#6b4ba8;color:white;}
.sum-strip{background:var(--cream-warm);border-top:1px solid var(--border);padding:10px 13px;flex-shrink:0;}
.sum-row{display:flex;justify-content:space-between;margin-bottom:7px;}
.si{text-align:center;}
.sn{font-size:.9rem;font-weight:800;color:var(--forest);}
.sl{font-size:.56rem;color:rgba(26,38,24,.38);text-transform:uppercase;letter-spacing:.05em;}
.sn.a{color:var(--sage);}
.sn.na{color:var(--rose);}
.sn.m{color:var(--gold);}
.sn.nv{color:rgba(26,38,24,.3);}
.sub-btn{width:100%;font-size:.82rem;font-weight:700;padding:11px;border-radius:11px;border:none;cursor:pointer;background:linear-gradient(135deg,var(--sage),#4a7a3d);color:white;box-shadow:0 4px 14px var(--sage-glow);transition:all .22s;margin-top:5px;}
.sub-btn:hover{box-shadow:0 6px 20px var(--sage-glow);transform:translateY(-1px);}

/* MODAL */
.mo{position:fixed;inset:0;z-index:500;background:rgba(26,38,24,.6);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;padding:20px;}
.mo.open{display:flex;}
.mb{background:white;border:1px solid var(--border-med);border-radius:22px;padding:28px;width:480px;max-width:95vw;box-shadow:var(--sh-deep);animation:mpop .25s cubic-bezier(.34,1.56,.64,1);}
@keyframes mpop{from{transform:scale(.9);opacity:0;}to{transform:scale(1);opacity:1;}}
.mb-t{font-size:1.05rem;font-weight:800;color:var(--forest);margin-bottom:6px;}
.mb-s{font-size:.78rem;color:rgba(26,38,24,.5);margin-bottom:18px;}
.mb-sg{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:16px;}
.mb-si{background:var(--cream-warm);border:1px solid var(--border);border-radius:11px;padding:12px 14px;}
.mb-sn{font-size:1.2rem;font-weight:800;margin-bottom:2px;}
.mb-sl{font-size:.62rem;color:rgba(26,38,24,.4);text-transform:uppercase;letter-spacing:.05em;}
.mb-w{background:var(--rose-light);border:1px solid rgba(200,75,75,.2);border-radius:10px;padding:10px 14px;font-size:.76rem;color:var(--rose);margin-bottom:16px;}
.mb-as{display:flex;gap:9px;}
.mb-can{flex:1;font-size:.8rem;font-weight:600;padding:11px;border-radius:10px;border:1.5px solid var(--border-med);background:none;color:var(--forest-muted);cursor:pointer;}
.mb-can:hover{border-color:var(--sage);color:var(--sage);}
.mb-con{flex:2;font-size:.82rem;font-weight:700;padding:11px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--sage),#4a7a3d);color:white;cursor:pointer;}

.rv{display:none;flex-direction:column;height:100vh;overflow-y:auto;background:var(--cream);}
.rv::-webkit-scrollbar{width:3px;}
.rv::-webkit-scrollbar-thumb{background:var(--border-med);border-radius:3px;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:var(--border-med);border-radius:3px;}

/* ═══════════════════════════════════
   MOBILE RESPONSIVE — All Pages
═══════════════════════════════════ */

/* Hamburger button - only shows on mobile */
.mob-menu-btn {
  display: none;
  width: 36px; height: 36px;
  border-radius: 9px;
  background: var(--cream-warm);
  border: 1.5px solid var(--border-med);
  align-items: center; justify-content: center;
  cursor: pointer; font-size: 1.1rem;
  flex-shrink: 0; transition: all .2s;
  color: var(--forest);
}
.mob-menu-btn:hover { border-color: var(--sage); background: var(--sage-light); }

/* Overlay behind sidebar on mobile */
.sb-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(26,38,24,.55);
  backdrop-filter: blur(4px);
  z-index: 290;
}
.sb-overlay.open { display: block; }

/* TABLET: 860px - 1100px */
@media(max-width:1100px) {
  .g4 { grid-template-columns: repeat(2,1fr) !important; }
  .g3 { grid-template-columns: repeat(2,1fr) !important; }
}

/* MOBILE: up to 860px */
@media(max-width:860px) {
  /* Sidebar slides in */
  .sb {
    transform: translateX(-100%);
    transition: transform .3s cubic-bezier(.4,0,.2,1);
    z-index: 300;
  }
  .sb.open { transform: translateX(0); }

  /* Main takes full width */
  .main { margin-left: 0 !important; }

  /* Show hamburger */
  .mob-menu-btn { display: flex; }

  /* Topbar adjustments */
  .tb { padding: 0 14px; gap: 8px; }
  .tb-search { display: none; }
  .tb-title { font-size: .82rem; }
  .tb-crumb { font-size: .58rem; }

  /* All grids become single column */
  .g4,.g3,.g2,.g21,.g12,.g31 {
    grid-template-columns: 1fr !important;
  }

  /* Content padding */
  .content { padding: 14px 14px 40px !important; }

  /* Cards */
  .card { padding: 15px; }
  .kpi { padding: 14px; }
  .kpi-n { font-size: 1.35rem; }

  /* Stabs - horizontal scroll */
  .stabs { padding: 0 14px; }
  .stab { padding: 0 10px; font-size: .7rem; }

  /* Hero banners */
  div[style*="grid-template-columns:1fr auto"] {
    grid-template-columns: 1fr !important;
  }

  /* Tables */
  .lbt-head, .lb-row {
    grid-template-columns: 44px 1fr 80px 54px !important;
  }
  .lbt-th:nth-child(4), .lb-row .streak-cell,
  .lbt-th:nth-child(5), .lb-row .loc-cell,
  .lbt-th:nth-child(6), .lbt-th:nth-child(7) { display: none !important; }

  /* 3-col layout pages */
  .content { display: flex !important; flex-direction: column !important; }
  .lp, .col-left { display: none !important; }
  .col-right, .rp { display: none !important; }
  .cp, .col-center { flex: 1 !important; }

  /* Mock test specific */
  .layout { flex-direction: column !important; }
  .palette-panel, .pp {
    width: 100% !important;
    height: 200px;
    border-left: none !important;
    border-top: 1px solid var(--border);
  }
  .palette-scroll, .pp-scroll { padding: 8px 10px; }
  .pp-grid, .palette-grid { grid-template-columns: repeat(10,1fr) !important; }
  .p-btn, .pb { aspect-ratio: 1; font-size: .58rem; }
  .q-panel, .qp { flex: 1; min-height: 0; }

  /* Mock test topbar */
  .topbar { padding: 0 12px; gap: 8px; flex-wrap: wrap; height: auto !important; min-height: 56px; }
  .tb-center { order: 3; width: 100%; padding-bottom: 8px; justify-content: flex-start; }
  .subj-tabs { gap: 3px; }
  .subj-tab { padding: 4px 10px; font-size: .68rem; }
  .tb-test-name { display: none; }
  .timer-val { font-size: .82rem; }

  /* Scope bar */
  .scope-bar { flex-wrap: wrap; border-radius: 12px; }
  .scope-tab { flex: none; padding: 8px 12px; font-size: .72rem; }

  /* Podium hide my-ranks */
  .my-ranks { display: none !important; }

  /* Hero inner grid */
  .hero-inner { grid-template-columns: 1fr !important; }

  /* Result hero */
  div[style*="grid-template-columns:auto 1fr auto"] {
    grid-template-columns: 1fr !important;
  }
  div[style*="grid-template-columns:repeat(3,1fr)"] {
    grid-template-columns: repeat(2,1fr) !important;
  }

  /* Badges grid */
  .badges-grid { grid-template-columns: repeat(4,1fr) !important; }

  /* Planner days */

// ════ STATE ════
const TOTAL_TIME = 3*3600;
let timeLeft = TOTAL_TIME;
let curS = 0, curSc = 0, curQ = 0;
const QST = {};
QS.forEach(q=>{ QST[q.id]={visited:false,answered:false,marked:false,answer:null}; });

function getQs(s,sc){ return QS.filter(q=>q.s===s&&q.sc===sc); }
function getCurQ(){ return getQs(curS,curSc)[curQ]||null; }
function gn(si,sci,qi){
  let n=1;
  for(let s=0;s<si;s++) n+=SUBJS[s].secs.reduce((a,b)=>a+b.qc,0);
  for(let sc=0;sc<sci;sc++) n+=SUBJS[si].secs[sc].qc;
  return n+qi;
}
function gi(){ return gn(curS,curSc,curQ); }

function renderSecTabs(){
  const tabs=document.getElementById('sec-tabs');
  tabs.innerHTML=SUBJS[curS].secs.map((s,i)=>`<button class="stab ${i===curSc?'on':''}" onclick="switchSec(${i})">${s.name}</button>`).join('');
  const qs=getQs(curS,curSc);
  document.getElementById('sec-info').textContent=`Q ${curQ+1} of ${qs.length}`;
}

function renderQ(){
  const q=getCurQ(); if(!q)return;
  const st=QST[q.id]; st.visited=true;
  const subj=SUBJS[q.s]; const sec=subj.secs[q.sc];
  const answered=QS.filter(qq=>QST[qq.id].answered).length;
  document.getElementById('qpf').style.width=`${(answered/90)*100}%`;
  document.getElementById('qcnt').textContent=`Q${gi()} / 90`;
  document.getElementById('sec-info').textContent=`Q ${curQ+1} of ${getQs(curS,curSc).length}`;
  const mb=document.getElementById('mbtn');
  mb.classList.toggle('marked',st.marked);
  mb.textContent=st.marked?'🔖 Marked':'🔖 Mark for Review';

  const isInt=q.type==='integer';
  const typeHtml=isInt
    ?`<span class="q-type-b qt-integer">Integer Type</span><div class="q-marks"><span class="mp">+4 correct</span><span class="mn">0 wrong</span></div>`
    :`<span class="q-type-b qt-single">Single Correct</span><div class="q-marks"><span class="mp">+4 correct</span><span class="mn">−1 wrong</span></div>`;

  let contentHtml='';
  if(isInt){
    contentHtml=`<div class="int-wrap">
      <div class="int-lbl">Enter your answer (integer value, can be negative):</div>
      <input type="number" class="int-input" id="ii" value="${st.answer||''}" placeholder="0" oninput="saveInt(this.value)">
      <div class="calc-pad">
        ${[7,8,9,4,5,6,1,2,3].map(n=>`<button class="calc-btn" onclick="addDigit('${n}')">${n}</button>`).join('')}
        <button class="calc-btn" onclick="addDigit('0')">0</button>
        <button class="calc-btn neg" onclick="toggleNeg()">±</button>
        <button class="calc-btn sp" onclick="clearInt()">✕</button>
      </div>
      ${sec.attempt?`<div style="font-size:.72rem;color:var(--amber);background:var(--amber-light);border:1px solid rgba(184,115,51,.2);border-radius:8px;padding:8px 12px;margin-top:8px;">ℹ️ Section B: Attempt any <strong>${sec.attempt}</strong> out of ${sec.qc} questions. Best ${sec.attempt} will be considered.</div>`:''}
    </div>`;
  } else {
    contentHtml=`<div class="q-opts">
      ${q.opts.map((o,i)=>`
      <div class="opt ${st.answer===i?'on':''}" onclick="selOpt(${i})">
        <div class="ok">${['A','B','C','D'][i]}</div>
        <div class="ot">${o}</div>
      </div>`).join('')}
    </div>`;
  }

  document.getElementById('qbody').innerHTML=`
  <div class="q-hdr">
    <div class="q-num-b">
      <div class="q-num">Q${gi()}</div>
      <div>${typeHtml}</div>
    </div>
    <div class="q-acts">
      <button class="q-ab ${st.marked?'bm':''}" onclick="toggleMark()" title="Mark">🔖</button>
      <button class="q-ab" onclick="alert('Hint: ${(q.hint||'Think carefully!').replace(/'/g,"\\'")}')">💡</button>
      <button class="q-ab" onclick="alert('Reported!')">⚑</button>
    </div>
  </div>
  <div class="q-tb">
    <div class="q-stag ${subj.cls}">${subj.icon} ${subj.name} · ${sec.name}</div>
    <div class="q-txt">${q.text}</div>
  </div>
  ${contentHtml}`;

  renderPalette(); updateSum();
}

function selOpt(i){
  const q=getCurQ(); if(!q)return;
  QST[q.id].answer=i; QST[q.id].answered=true;
  renderQ();
}

function saveInt(v){
  const q=getCurQ(); if(!q)return;
  QST[q.id].answer=v; QST[q.id].answered=v!==''&&v!==null;
  updateSum(); renderPalette();
}

function addDigit(d){
  const el=document.getElementById('ii'); if(!el)return;
  el.value=el.value+d; saveInt(el.value);
}

function toggleNeg(){
  const el=document.getElementById('ii'); if(!el)return;
  el.value=el.value.startsWith('-')?el.value.slice(1):'-'+el.value;
  saveInt(el.value);
}

function clearInt(){
  const el=document.getElementById('ii');if(el){el.value='';saveInt('');}
}

function clearAns(){
  const q=getCurQ();if(!q)return;
  QST[q.id].answer=null;QST[q.id].answered=false;QST[q.id].marked=false;
  renderQ();
}

function toggleMark(){
  const q=getCurQ();if(!q)return;
  QST[q.id].marked=!QST[q.id].marked; renderQ();
}

function nav(d){
  const qs=getQs(curS,curSc);
  const ni=curQ+d;
  if(ni>=0&&ni<qs.length){curQ=ni;}
  else if(d>0){
    const secs=SUBJS[curS].secs;
    if(curSc<secs.length-1){curSc++;curQ=0;}
    else if(curS<SUBJS.length-1){curS++;curSc=0;curQ=0;updSubjTabs();}
  } else {
    if(curSc>0){curSc--;curQ=getQs(curS,curSc).length-1;}
    else if(curS>0){curS--;curSc=SUBJS[curS].secs.length-1;curQ=getQs(curS,curSc).length-1;updSubjTabs();}
  }
  renderSecTabs();renderQ();
}

function switchSubj(idx,el){
  curS=idx;curSc=0;curQ=0;updSubjTabs();renderSecTabs();renderQ();
}

function updSubjTabs(){
  document.querySelectorAll('.subj-tab').forEach((t,i)=>t.classList.toggle('active',i===curS));
}

function switchSec(idx){curSc=idx;curQ=0;renderSecTabs();renderQ();}
function jumpToQ(si,sci,qi){curS=si;curSc=sci;curQ=qi;updSubjTabs();renderSecTabs();renderQ();}

function renderPalette(){
  const pal=document.getElementById('palette');
  const q=getCurQ();
  let h='';
  SUBJS.forEach((subj,si)=>{
    h+=`<div class="pp-slbl">${subj.icon} ${subj.name}</div>`;
    subj.secs.forEach((sec,sci)=>{
      const qs=getQs(si,sci);if(!qs.length)return;
      h+=`<div style="font-size:.6rem;color:rgba(26,38,24,.35);margin-bottom:4px">${sec.name}${sec.attempt?` (attempt any ${sec.attempt})`:''}</div>`;
      h+='<div class="pp-grid">';
      qs.forEach((qq,qi)=>{
        const st=QST[qq.id];
        const isCur=qq.id===(q?q.id:0);
        let cls='pnv';
        if(st.answered&&st.marked)cls='pma';
        else if(st.answered)cls='pa';
        else if(st.marked)cls='pm';
        else if(st.visited)cls='pna';
        h+=`<button class="pb ${cls} ${isCur?'cur':''}" onclick="jumpToQ(${si},${sci},${qi})" title="Q${gn(si,sci,qi)}">${gn(si,sci,qi)}</button>`;
      });
      h+='</div>';
    });
  });
  pal.innerHTML=h;
}

function updateSum(){
  const ans=QS.filter(q=>QST[q.id].answered&&!QST[q.id].marked).length;
  const mA=QS.filter(q=>QST[q.id].marked&&QST[q.id].answered).length;
  const na=QS.filter(q=>QST[q.id].visited&&!QST[q.id].answered&&!QST[q.id].marked).length;
  const mk=QS.filter(q=>QST[q.id].marked&&!QST[q.id].answered).length;
  const nv=QS.filter(q=>!QST[q.id].visited).length;
  document.getElementById('s-ans').textContent=ans+mA;
  document.getElementById('s-na').textContent=na;
  document.getElementById('s-mk').textContent=mk;
  document.getElementById('s-nv').textContent=nv;
}

// Timer
function ft(s){
  const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}
const TI=setInterval(()=>{
  if(timeLeft<=0){clearInterval(TI);submitTest();return;}
  timeLeft--;
  document.getElementById('timer').textContent=ft(timeLeft);
  const b=document.getElementById('tbox');
  if(timeLeft<=300)b.className='timer-box danger';
  else if(timeLeft<=900)b.className='timer-box warning';
},1000);

function openMo(){
  const ans=QS.filter(q=>QST[q.id].answered).length;
  const na=QS.filter(q=>QST[q.id].visited&&!QST[q.id].answered).length;
  const mk=QS.filter(q=>QST[q.id].marked).length;
  const nv=QS.filter(q=>!QST[q.id].visited).length;
  document.getElementById('mo-time').textContent=ft(timeLeft);
  document.getElementById('mo-stats').innerHTML=`
  <div class="mb-si"><div class="mb-sn" style="color:var(--sage)">${ans}</div><div class="mb-sl">Answered</div></div>
  <div class="mb-si"><div class="mb-sn" style="color:var(--rose)">${na}</div><div class="mb-sl">Not Answered</div></div>
  <div class="mb-si"><div class="mb-sn" style="color:var(--gold)">${mk}</div><div class="mb-sl">Marked</div></div>
  <div class="mb-si"><div class="mb-sn" style="color:rgba(26,38,24,.35)">${nv}</div><div class="mb-sl">Not Visited</div></div>`;
  document.getElementById('mo-warn').innerHTML=nv>0
    ?`⚠️ <strong>${nv} questions not visited.</strong> Don't forget Section B — attempt any 5!`
    :`✅ All 90 questions attempted!`;
  document.getElementById('mo').classList.add('open');
}
function closeMo(){document.getElementById('mo').classList.remove('open');}
document.getElementById('mo').addEventListener('click',e=>{if(e.target===document.getElementById('mo'))closeMo();});

function submitTest(){
  clearInterval(TI); closeMo();
  let score=0,correct=0,wrong=0,skipped=0;
  QS.forEach(q=>{
    const st=QST[q.id];
    if(!st.answered){skipped++;return;}
    const myAns=q.type==='integer'?String(st.answer).trim():st.answer;
    const corrAns=q.type==='integer'?String(q.ans):q.ans;
    if(myAns==corrAns){score+=4;correct++;}
    else if(q.type==='mcq'){score-=1;wrong++;}
    else skipped++;
  });
  const tt=TOTAL_TIME-timeLeft;
  const th=Math.floor(tt/3600),tm=Math.floor((tt%3600)/60);
  const pct=Math.round(score/300*100);

  document.getElementById('ti').style.display='none';
  const rv=document.getElementById('rv');
  rv.style.display='flex';
  rv.innerHTML=`
  <div style="background:linear-gradient(145deg,var(--forest),var(--forest-soft),#0e1a24);padding:32px 5%;position:relative;overflow:hidden;">
    <div style="position:absolute;inset:0;background-image:linear-gradient(rgba(59,130,196,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,196,.05) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;"></div>
    <div style="position:absolute;width:260px;height:260px;border-radius:50%;background:rgba(79,70,229,.15);filter:blur(55px);top:-60px;right:60px;pointer-events:none;"></div>
    <div style="max-width:900px;margin:0 auto;position:relative;z-index:1;">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;">
        <div style="width:32px;height:32px;background:linear-gradient(135deg,var(--sage),#4a7a3d);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:.76rem;font-weight:800;color:white;">MA</div>
        <span style="font-size:.95rem;font-weight:900;color:white;">Mock</span><span style="font-size:.95rem;font-weight:900;background:linear-gradient(135deg,#818cf8,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">Arena</span>
      </div>
      <div style="font-size:.62rem;font-weight:600;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;">JEE Main Mock #22 · Result</div>
      <div style="font-size:1.55rem;font-weight:900;color:white;letter-spacing:-.04em;margin-bottom:5px;">
        ${score>=270?'🏆 Excellent! 99+ Percentile!':score>=240?'👍 Great Score!':score>=180?'📈 Good Attempt!':'💪 Keep Practicing!'}
      </div>
      <div style="font-size:.8rem;color:rgba(255,255,255,.42);">Time: ${th}h ${tm}m · 90 Questions · PCM · +4/−1 marking</div>
    </div>
  </div>
  <div style="max-width:900px;margin:0 auto;padding:26px 20px;width:100%;">
    <div style="background:white;border:1px solid var(--border);border-radius:20px;padding:22px;margin-bottom:18px;box-shadow:var(--sh);">
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px;">
        ${[[score,'Score (out of 300)','var(--forest)'],[correct,'Correct','var(--sage)'],[wrong,'Wrong (−1 each)','var(--rose)'],[skipped,'Skipped / Not Ans.','rgba(26,38,24,.35)']].map(([n,l,c])=>`
        <div style="background:var(--cream-warm);border:1px solid var(--border);border-radius:13px;padding:14px;text-align:center;">
          <div style="font-size:1.75rem;font-weight:800;color:${c};letter-spacing:-.04em;">${n}</div>
          <div style="font-size:.64rem;font-weight:600;color:rgba(26,38,24,.4);text-transform:uppercase;letter-spacing:.06em;margin-top:4px;">${l}</div>
        </div>`).join('')}
      </div>
      <div style="margin-bottom:14px;">
        <div style="display:flex;justify-content:space-between;font-size:.76rem;font-weight:600;color:var(--forest-muted);margin-bottom:6px;"><span>Score Percentage</span><span style="color:${pct>=90?'var(--sage)':pct>=60?'var(--amber)':'var(--rose)'}">${pct}%</span></div>
        <div style="height:8px;background:var(--cream-warm);border-radius:4px;overflow:hidden;border:1px solid var(--border);">
          <div style="height:100%;width:${pct}%;background:linear-gradient(90deg,var(--indigo),var(--sage));border-radius:4px;"></div>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;">
        ${[['⚛️','Physics','var(--sky)'],['🧪','Chemistry','var(--sage)'],['📐','Mathematics','var(--gold)']].map(([ic,n,c])=>{
          const subjQs=QS.filter(q=>q.s===['Physics','Chemistry','Mathematics'].indexOf(n));
          const subjCorrect=subjQs.filter(q=>{
            const st=QST[q.id];if(!st.answered)return false;
            const ma=q.type==='integer'?String(st.answer).trim():st.answer;
            const ca=q.type==='integer'?String(q.ans):q.ans;
            return ma==ca;
          }).length;
          const acc=Math.round(subjCorrect/30*100);
          return `<div style="background:var(--cream-warm);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center;">
            <div style="font-size:1.2rem;margin-bottom:5px">${ic}</div>
            <div style="font-size:.82rem;font-weight:700;color:var(--forest);margin-bottom:3px">${n}</div>
            <div style="font-size:1.1rem;font-weight:800;color:${c}">${acc}%</div>
            <div style="font-size:.62rem;color:rgba(26,38,24,.35)">${subjCorrect}/30 correct</div>
          </div>`;
        }).join('')}
      </div>
    </div>
    <div style="display:flex;gap:12px;flex-wrap:wrap;">
      <button style="font-size:.84rem;font-weight:700;padding:13px 24px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--sage),#4a7a3d);color:white;cursor:pointer;box-shadow:0 4px 14px var(--sage-glow);" onclick="window.location.href='mockarena_results.html'">📊 Full Analysis →</button>
      <button style="font-size:.84rem;font-weight:700;padding:13px 24px;border-radius:12px;border:1.5px solid var(--border-med);background:none;color:var(--forest-muted);cursor:pointer;" onclick="window.location.href='mockarena_dashboard.html'">⬡ Dashboard</button>
      <button style="font-size:.84rem;font-weight:700;padding:13px 24px;border-radius:12px;border:1.5px solid var(--border-med);background:none;color:var(--forest-muted);cursor:pointer;" onclick="location.reload()">↺ Reattempt</button>
    </div>
  </div>`;
}

function showInstr(){
  alert(`JEE Main Mock #22 — Instructions\n\n📋 EXAM PATTERN:\n• Total 90 Questions · 300 Marks · 3 Hours\n• Physics: 20 MCQ (Section A) + 10 Integer (Section B, attempt any 5)\n• Chemistry: 20 MCQ (Section A) + 10 Integer (Section B, attempt any 5)\n• Mathematics: 20 MCQ (Section A) + 10 Integer (Section B, attempt any 5)\n\n⏱ DURATION: 3 Hours\n📊 TOTAL MARKS: 300\n\n🔖 MARKING SCHEME:\n• MCQ Correct: +4 | Wrong: −1 | Skipped: 0\n• Integer Correct: +4 | Wrong/Skipped: 0 (NO negative marking)\n\n⚠️ SECTION B:\n• 10 questions given, attempt ANY 5\n• Best 5 attempted responses will be evaluated\n• Integer answers: any non-negative integer\n\n💡 STRATEGY:\n• Attempt all Section A MCQ you know\n• In Section B, choose your 5 strongest questions\n• Integer type has no negative marking — attempt all 10!`);
}

// INIT
renderSecTabs(); renderQ();
</script>

<script>
(function(){
  if(document.querySelector('.mob-ham')) return;
  var ov=document.createElement('div');
  ov.className='sb-overlay';
  ov.onclick=close;
  document.body.appendChild(ov);
  var ham=document.createElement('div');
  ham.className='mob-ham';
  ham.innerHTML='&#9776;';
  ham.style.cssText='display:none;width:34px;height:34px;border-radius:8px;background:var(--cream-warm,#f5f3ec);border:1.5px solid rgba(26,38,24,.13);align-items:center;justify-content:center;cursor:pointer;font-size:1rem;flex-shrink:0;color:#1a2618;margin-right:4px;';
  ham.onclick=toggle;
  var tb=document.querySelector('.tb');
  if(tb) tb.insertBefore(ham,tb.firstChild);
  function checkSize(){ ham.style.display=window.innerWidth<=860?'flex':'none'; }
  checkSize(); window.addEventListener('resize',checkSize);
  function toggle(){ document.querySelector('.sb').classList.contains('mob-open')?close():open(); }
  function open(){ document.querySelector('.sb').classList.add('mob-open'); ov.classList.add('mob-open'); document.body.style.overflow='hidden'; }
  function close(){ var sb=document.querySelector('.sb'); if(sb)sb.classList.remove('mob-open'); ov.classList.remove('mob-open'); document.body.style.overflow=''; }
  document.querySelectorAll('.sb-nav,.sb-nav a').forEach(function(el){ el.addEventListener('click',function(){ if(window.innerWidth<=860)close(); }); });
})();
</script>
