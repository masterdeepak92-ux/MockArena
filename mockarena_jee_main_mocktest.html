<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MockArena — JEE Mains Mock Test #8</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Lora:ital,wght@0,400;0,600;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --cream:#faf9f5;--cream-w:#f5f3ec;
  --forest:#1a2618;--forest-s:#243422;--forest-m:#3d5239;
  --sage:#6b8f5e;--sage-l:rgba(107,143,94,.1);--sage-g:rgba(107,143,94,.2);
  --gold:#c8962a;--gold-d:rgba(200,150,42,.08);
  --rose:#c84b4b;--rose-l:rgba(200,75,75,.09);
  --sky:#3b82c4;--sky-l:rgba(59,130,196,.09);
  --amber:#b87333;--amb-l:rgba(184,115,51,.09);
  --purple:#7c5cbf;--pur-l:rgba(124,92,191,.09);
  --border:rgba(26,38,24,.08);--bm:rgba(26,38,24,.13);
  --fd:'Outfit',sans-serif;--fs:'Lora',serif;--fm:'IBM Plex Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;-webkit-font-smoothing:antialiased;}
body{font-family:var(--fd);background:var(--cream-w);color:var(--forest);display:flex;flex-direction:column;overflow:hidden;}
@media(max-width:860px){html,body{height:auto!important;overflow-x:hidden!important;overflow-y:auto!important;}}

.topbar{height:52px;background:var(--forest);display:flex;align-items:center;padding:0 14px;gap:8px;flex-shrink:0;border-bottom:2px solid rgba(107,143,94,.2);}
.tb-logo{display:flex;align-items:center;gap:7px;text-decoration:none;flex-shrink:0;}
.tb-mark{width:28px;height:28px;background:linear-gradient(135deg,var(--sage),#4a7a3d);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:800;color:white;}
.tb-n1{color:white;font-size:.86rem;font-weight:800;}
.tb-n2{font-size:.86rem;font-weight:800;background:linear-gradient(135deg,#818cf8,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.tb-pipe{width:1px;height:14px;background:rgba(255,255,255,.12);}
.tb-test{font-size:.64rem;font-weight:600;color:rgba(255,255,255,.3);}
.tb-subjs{display:flex;gap:2px;background:rgba(255,255,255,.07);border-radius:7px;padding:2px;margin:0 4px;}
.tsj{font-family:var(--fd);font-size:.66rem;font-weight:600;padding:4px 10px;border-radius:5px;border:none;background:none;color:rgba(255,255,255,.4);cursor:pointer;transition:all .2s;white-space:nowrap;}
.tsj:hover{color:rgba(255,255,255,.8);}
.tsj.on,.tsj.active{color:white;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.15);}
.tsj.phy.on,.tsj.phy.active{background:rgba(59,130,196,.3);}
.tsj.che.on,.tsj.che.active{background:rgba(107,143,94,.3);}
.tsj.mat.on,.tsj.mat.active{background:rgba(200,150,42,.25);}
.tsj.bio.on,.tsj.bio.active{background:rgba(124,92,191,.25);}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:6px;}
.tb-user{font-size:.64rem;color:rgba(255,255,255,.3);}
.tb-av{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--gold),#e8a830);display:flex;align-items:center;justify-content:center;font-size:.6rem;font-weight:700;color:white;overflow:hidden;}
.tb-timer{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:7px;padding:3px 9px;text-align:center;}
.tb-tv{font-family:var(--fm);font-size:.78rem;font-weight:600;color:white;letter-spacing:.04em;display:block;}
.tb-tl{font-size:.44rem;color:rgba(255,255,255,.25);text-transform:uppercase;letter-spacing:.07em;}
.tb-timer.warning,.tb-timer.warn{background:rgba(200,150,42,.15);border-color:rgba(200,150,42,.3);}
.tb-timer.warning .tb-tv,.tb-timer.warn .tb-tv{color:var(--gold);}
.tb-timer.danger{background:rgba(200,75,75,.15);border-color:rgba(200,75,75,.3);}
.tb-timer.danger .tb-tv{color:#ff6b6b;animation:blink .8s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.4;}}
.tb-btn{font-family:var(--fd);font-size:.66rem;font-weight:700;padding:6px 11px;border-radius:7px;border:none;cursor:pointer;transition:all .2s;}
.tb-instr{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12)!important;color:rgba(255,255,255,.6);}
.tb-submit{background:linear-gradient(135deg,var(--sage),#4a7a3d);color:white;box-shadow:0 2px 7px var(--sage-g);}

.sec-bar{background:white;border-bottom:1px solid var(--border);padding:5px 14px;display:flex;align-items:center;gap:6px;flex-shrink:0;}
.sec-lbl{font-size:.58rem;font-weight:700;color:rgba(26,38,24,.26);text-transform:uppercase;letter-spacing:.07em;}
.sec-tab{font-family:var(--fd);font-size:.64rem;font-weight:600;padding:3px 10px;border-radius:6px;border:1.5px solid var(--bm);background:var(--cream-w);color:var(--forest-m);cursor:pointer;transition:all .18s;}
.sec-tab:hover{border-color:var(--sage);color:var(--sage);}
.sec-tab.on,.sec-tab.active{background:var(--forest);color:white;border-color:var(--forest);}
.sec-inf{margin-left:auto;font-family:var(--fm);font-size:.58rem;color:rgba(26,38,24,.24);}
.prog{height:2px;background:var(--border);flex-shrink:0;}
.prog-f{height:100%;background:linear-gradient(90deg,var(--sage),#4a7a3d);transition:width .3s;}

.body-wrap{display:flex;flex:1;overflow:hidden;}
@media(max-width:860px){.body-wrap{flex-direction:column;overflow:visible;}}
.q-area{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.q-scroll{flex:1;overflow-y:auto;padding:14px 18px;background:var(--cream-w);}
.q-scroll::-webkit-scrollbar{width:4px;}
.q-scroll::-webkit-scrollbar-thumb{background:var(--bm);border-radius:4px;}

.q-footer{background:white;border-top:1px solid var(--border);padding:9px 14px;display:flex;align-items:center;gap:7px;flex-shrink:0;box-shadow:0 -2px 8px rgba(26,38,24,.05);flex-wrap:wrap;}
.fn-btn{font-family:var(--fd);font-size:.7rem;font-weight:700;padding:8px 13px;border-radius:9px;border:none;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:4px;white-space:nowrap;}
.fn-mark{background:var(--gold);color:white;}
.fn-mark.on{background:#e8a020;}
.fn-clear{background:none!important;border:1.5px solid var(--bm)!important;color:var(--forest-m);}
.fn-clear:hover{border-color:var(--rose)!important;color:var(--rose);}
.fn-save{background:var(--sage);color:white;}
.fn-sp{flex:1;}
.fn-ctr{font-family:var(--fm);font-size:.6rem;color:rgba(26,38,24,.25);}
.fn-prev{background:none!important;border:1.5px solid var(--bm)!important;color:var(--forest-m);}
.fn-next{background:var(--forest);color:white;}

.right-strip{width:50px;flex-shrink:0;background:var(--forest);display:flex;flex-direction:column;align-items:center;padding:8px 4px;gap:4px;border-left:1px solid rgba(255,255,255,.05);overflow-y:auto;}
.right-strip::-webkit-scrollbar{width:0;}
.rs-btn{width:38px;height:38px;border-radius:9px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;transition:all .2s;border:1.5px solid rgba(255,255,255,.08);background:rgba(255,255,255,.05);color:rgba(255,255,255,.4);font-size:.82rem;}
.rs-btn:hover{background:rgba(255,255,255,.12);color:white;}
.rs-btn.rs-on{background:rgba(107,143,94,.2);border-color:var(--sage);color:var(--sage);}
.rs-btn.rs-danger{background:rgba(200,75,75,.1);border-color:rgba(200,75,75,.2);color:#ff8888;}
.rs-lbl{font-size:.38rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;}
.rs-div{width:24px;height:1px;background:rgba(255,255,255,.06);margin:1px 0;}

.pal-overlay{display:none;position:fixed;inset:0;background:rgba(26,38,24,.5);backdrop-filter:blur(4px);z-index:200;}
.pal-overlay.on{display:block;}
.pal-drawer{position:fixed;top:0;right:-310px;width:290px;height:100vh;background:white;border-left:1px solid var(--border);display:flex;flex-direction:column;z-index:300;transition:right .28s cubic-bezier(.22,1,.36,1);box-shadow:-5px 0 28px rgba(26,38,24,.1);}
.pal-drawer.on{right:0;}
.pal-hdr{background:var(--forest);padding:12px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.pal-title{font-size:.76rem;font-weight:700;color:white;}
.pal-close{width:24px;height:24px;border-radius:6px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.14);color:white;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.74rem;transition:all .18s;}
.pal-close:hover{background:var(--rose);border-color:var(--rose);}
.pal-legend{padding:7px 11px;border-bottom:1px solid var(--border);flex-shrink:0;}
.pal-leg-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;}
.pal-leg-item{display:flex;align-items:center;gap:4px;font-size:.58rem;color:var(--forest-m);}
.pal-leg-dot{width:16px;height:16px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.5rem;font-weight:700;}
.lg-a{background:var(--sage);color:white;}.lg-n{background:var(--rose);color:white;}.lg-v{background:#bbb;color:white;}.lg-m{background:var(--gold);color:white;}.lg-ma{background:var(--purple);color:white;}
.pal-scroll{flex:1;overflow-y:auto;padding:8px 11px;}
.pal-scroll::-webkit-scrollbar{width:3px;}
.pal-scroll::-webkit-scrollbar-thumb{background:var(--bm);border-radius:3px;}
.palette-subj-label{font-size:.56rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:rgba(26,38,24,.25);margin:7px 0 4px;display:flex;align-items:center;gap:5px;}
.palette-subj-label::after{content:'';flex:1;height:1px;background:var(--border);}
.palette-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin-bottom:3px;}
.p-btn{width:100%;aspect-ratio:1;border-radius:50%;border:2px solid;display:flex;align-items:center;justify-content:center;font-family:var(--fm);font-size:.62rem;font-weight:700;cursor:pointer;transition:all .18s;}
.p-btn:hover{transform:scale(1.1);}
.p-btn.current{box-shadow:0 0 0 2px var(--forest),0 0 0 3px rgba(26,38,24,.1);}
.p-not-visited{background:#f0f0f0;border-color:#ccc;color:#999;}
.p-answered{background:var(--sage);border-color:#4a7a3d;color:white;}
.p-not-answered{background:var(--rose);border-color:#a83535;color:white;}
.p-marked{background:var(--gold);border-color:#b8832a;color:white;}
.p-marked-answered{background:var(--purple);border-color:#6b4ba8;color:white;}
.pal-sum{background:var(--cream-w);border-top:1px solid var(--border);padding:8px 11px;flex-shrink:0;}
.pal-sum-row{display:flex;justify-content:space-around;margin-bottom:6px;}
.ps-item{text-align:center;}
.ps-n{font-family:var(--fd);font-size:.84rem;font-weight:800;color:var(--forest);}
.ps-l{font-size:.48rem;color:rgba(26,38,24,.28);text-transform:uppercase;letter-spacing:.04em;}
.ps-n.a{color:var(--sage);}.ps-n.n{color:var(--rose);}.ps-n.m{color:var(--gold);}
.pal-submit{width:100%;font-family:var(--fd);font-size:.72rem;font-weight:700;padding:8px;border-radius:8px;border:none;cursor:pointer;background:linear-gradient(135deg,var(--sage),#4a7a3d);color:white;margin-top:5px;}

.mo{position:fixed;inset:0;z-index:500;background:rgba(26,38,24,.65);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;padding:14px;}
.mo.open{display:flex;}
.mb{background:white;border-radius:17px;padding:22px;width:400px;max-width:95vw;box-shadow:0 20px 60px rgba(26,38,24,.18);animation:pop .22s cubic-bezier(.34,1.56,.64,1);}
@keyframes pop{from{transform:scale(.9);opacity:0;}to{transform:scale(1);opacity:1;}}
.mb-t{font-size:.94rem;font-weight:800;color:var(--forest);margin-bottom:3px;}
.mb-s{font-size:.7rem;color:rgba(26,38,24,.4);margin-bottom:13px;}
.mb-g{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-bottom:12px;}
.mb-c{background:var(--cream-w);border:1px solid var(--border);border-radius:9px;padding:10px 12px;}
.mb-cn{font-family:var(--fd);font-size:1.08rem;font-weight:800;margin-bottom:2px;}
.mb-cl{font-size:.54rem;font-weight:500;color:rgba(26,38,24,.34);text-transform:uppercase;letter-spacing:.05em;}
.mb-w{background:var(--rose-l);border:1px solid rgba(200,75,75,.16);border-radius:8px;padding:8px 11px;font-size:.68rem;color:var(--rose);margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.mb-row{display:flex;gap:7px;}
.mb-cc{flex:1;font-family:var(--fd);font-size:.72rem;font-weight:600;padding:9px;border-radius:8px;border:1.5px solid var(--bm);background:none;color:var(--forest-m);cursor:pointer;}
.mb-cc:hover{border-color:var(--sage);color:var(--sage);}
.mb-ok{flex:2;font-family:var(--fd);font-size:.74rem;font-weight:700;padding:9px;border-radius:8px;border:none;background:linear-gradient(135deg,var(--sage),#4a7a3d);color:white;cursor:pointer;}

.result-view{display:none;flex-direction:column;height:100vh;overflow-y:auto;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.fade{animation:fadeIn .3s ease;}

@media(max-width:860px){
  .right-strip{display:none;}
  .q-scroll{padding:10px 12px;}
  .pal-drawer{width:88vw;}
  .tb-test{display:none;}
  .tsj{padding:3px 7px;font-size:.6rem;}
  .fn-btn{font-size:.66rem;padding:7px 10px;}
}

/* JEE MAIN — Q HEADER (uses q-hdr, q-num-b, q-acts, q-ab) */
.q-hdr{background:white;border:1px solid var(--border);border-radius:12px;padding:12px 16px;margin-bottom:12px;display:flex;align-items:center;gap:10px;box-shadow:0 1px 4px rgba(26,38,24,.04);}
.q-num-b{display:flex;align-items:center;gap:8px;}
.q-num{width:36px;height:36px;border-radius:9px;background:var(--forest);color:white;display:flex;align-items:center;justify-content:center;font-family:var(--fm);font-size:.78rem;font-weight:600;flex-shrink:0;}
/* type badge rendered inside q-num-b as html */
.q-tb-single{font-size:.6rem;font-weight:700;padding:2px 9px;border-radius:100px;background:var(--sky-l);color:var(--sky);border:1px solid rgba(59,130,196,.2);}
.q-tb-multi{font-size:.6rem;font-weight:700;padding:2px 9px;border-radius:100px;background:var(--pur-l);color:var(--purple);border:1px solid rgba(124,92,191,.2);}
.q-tb-int{font-size:.6rem;font-weight:700;padding:2px 9px;border-radius:100px;background:var(--amb-l);color:var(--amber);border:1px solid rgba(184,115,51,.2);}
.q-marks{font-size:.6rem;color:rgba(26,38,24,.35);display:flex;gap:7px;margin-top:3px;}
.q-acts{margin-left:auto;display:flex;gap:5px;}
.q-ab{width:28px;height:28px;border-radius:7px;border:1.5px solid var(--bm);background:var(--cream-w);cursor:pointer;font-size:.7rem;display:flex;align-items:center;justify-content:center;transition:all .18s;}
.q-ab:hover{border-color:var(--sage);background:var(--sage-l);}
.q-ab.bm{background:var(--gold-d);border-color:rgba(200,150,42,.3);}
/* Q TEXT BLOCK (uses q-tb, q-stag, q-txt) */
.q-tb{background:white;border:1px solid var(--border);border-radius:14px;padding:18px 22px;margin-bottom:12px;box-shadow:0 1px 4px rgba(26,38,24,.03);}
.q-stag{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;display:flex;align-items:center;gap:5px;}
.qt-phy{color:var(--sky);}.qt-chem{color:var(--sage);}.qt-math{color:var(--gold);}.qt-bio{color:var(--purple);}
.q-txt{font-family:var(--fs);font-size:1.02rem;color:var(--forest);line-height:1.86;}
/* OPTIONS (uses .opt, same as mocktest) */
.q-opts{display:flex;flex-direction:column;gap:9px;margin-bottom:12px;}
.opt{display:flex;align-items:center;gap:12px;padding:13px 16px;border-radius:12px;border:2px solid var(--bm);background:white;cursor:pointer;transition:all .2s;box-shadow:0 1px 3px rgba(26,38,24,.03);}
.opt:hover{border-color:var(--sage);background:var(--sage-l);transform:translateX(3px);}
.opt.sel{border-color:var(--sky);background:var(--sky-l);}
.opt.sel .opt-k{background:var(--sky);color:white;border-color:var(--sky);}
.opt.cor{border-color:var(--sage);background:rgba(107,143,94,.08);}
.opt.cor .opt-k{background:var(--sage);color:white;}
.opt.wrg{border-color:var(--rose);background:var(--rose-l);}
.opt.wrg .opt-k{background:var(--rose);color:white;}
.opt-k{width:34px;height:34px;border-radius:9px;border:2px solid var(--bm);background:var(--cream-w);display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:.76rem;font-weight:800;color:var(--forest-m);flex-shrink:0;transition:all .2s;}
.opt-t{font-size:.94rem;color:var(--forest);line-height:1.58;}
/* INTEGER (uses int-wrap, int-lbl, int-input, ii) */
.int-wrap{display:flex;flex-direction:column;gap:8px;margin-bottom:12px;}
.int-lbl{font-size:.7rem;font-weight:600;color:var(--forest-m);}
#ii{font-family:var(--fm);font-size:1.4rem;font-weight:700;color:var(--forest);background:white;border:2px solid var(--bm);border-radius:12px;padding:12px 18px;outline:none;width:175px;text-align:center;transition:all .2s;}
#ii:focus{border-color:var(--sage);box-shadow:0 0 0 3px var(--sage-l);}
.calc-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;width:175px;}
.calc-btn{font-family:var(--fm);font-size:.82rem;font-weight:600;padding:9px;border-radius:8px;border:1.5px solid var(--bm);background:white;color:var(--forest);cursor:pointer;transition:all .18s;text-align:center;}
.calc-btn:hover{border-color:var(--sage);background:var(--sage-l);}
.calc-btn.sp{background:var(--forest);color:white;border-color:var(--forest);}
/* Section tabs rendered by JS */
.sec-tab-btn{font-family:var(--fd);font-size:.64rem;font-weight:600;padding:3px 10px;border-radius:6px;border:1.5px solid var(--bm);background:var(--cream-w);color:var(--forest-m);cursor:pointer;transition:all .18s;}
.sec-tab-btn.on,.sec-tab-btn.active{background:var(--forest);color:white;border-color:var(--forest);}
</style>
<style>
/* ── MOCKTEST FIXES ── */
/* Bigger readable fonts */
.q-text,.q-txt{font-family:'Outfit',sans-serif!important;font-size:1.12rem!important;font-weight:500!important;line-height:1.72!important;}
.opt-text,.opt-t{font-family:'Outfit',sans-serif!important;font-size:1.02rem!important;font-weight:500!important;line-height:1.6!important;}

/* Fix empty space — q-scroll should NOT stretch */
@media(min-width:861px){
  .q-scroll{flex:none!important;overflow-y:visible!important;}
  .q-area{overflow-y:auto!important;}
  .right-strip{display:none!important;}
  .pal-overlay,.pal-drawer{display:none!important;}
}

/* Palette strip */
#pal-strip{background:white;border-top:2px solid rgba(26,38,24,.1);position:sticky;bottom:0;z-index:10;}
#pal-strip .ps-hdr{background:#1a2618;padding:7px 16px;display:flex;align-items:center;justify-content:space-between;}
#pal-strip .ps-title{font-size:.72rem;font-weight:700;color:white;}
#pal-strip .ps-timer{font-family:'IBM Plex Mono',monospace;font-size:.86rem;color:white;font-weight:600;}
#pal-strip .ps-legend{padding:5px 16px;display:flex;flex-wrap:wrap;gap:8px;background:#f5f4ef;}
#pal-strip .ps-leg{display:flex;align-items:center;gap:3px;font-size:.6rem;color:#3d5239;font-weight:500;}
#pal-strip .ps-dot{width:12px;height:12px;border-radius:50%;}
#pal-strip .ps-scroll{overflow-x:auto;overflow-y:hidden;padding:8px 16px;background:#f5f4ef;}
#pal-strip .ps-scroll::-webkit-scrollbar{height:3px;}
#pal-strip .ps-scroll::-webkit-scrollbar-thumb{background:rgba(26,38,24,.15);border-radius:3px;}
#pal-strip .palette-subj-label{font-size:.54rem!important;white-space:nowrap!important;margin:3px 0 2px!important;}
#pal-strip .palette-grid{display:flex!important;flex-direction:row!important;flex-wrap:nowrap!important;gap:5px!important;margin-bottom:4px!important;}
#pal-strip .p-btn{width:30px!important;height:30px!important;min-width:30px!important;border-radius:7px!important;font-size:.6rem!important;flex-shrink:0!important;}
#pal-strip .ps-sum{display:flex;align-items:center;justify-content:space-around;padding:6px 16px 7px;background:#f5f4ef;border-top:1px solid rgba(26,38,24,.06);}
#pal-strip .ps-stat{text-align:center;}
#pal-strip .ps-num{font-size:.86rem;font-weight:800;display:block;}

      <div class="pal-leg-item"><div class="pal-leg-dot lg-a">✓</div>Answered</div>
      <div class="pal-leg-item"><div class="pal-leg-dot lg-n">!</div>Not Answered</div>
      <div class="pal-leg-item"><div class="pal-leg-dot lg-v">—</div>Not Visited</div>
      <div class="pal-leg-item"><div class="pal-leg-dot lg-m">★</div>Marked</div>
      <div class="pal-leg-item"><div class="pal-leg-dot lg-ma">✓</div>Marked+Ans</div>
    </div>
  </div>
  <div class="pal-scroll" id="palette"></div>
  <div class="pal-sum">
    <div class="pal-sum-row">
      <div class="ps-item"><div class="ps-n a" id="s-ans">0</div><div class="ps-l">Ans</div></div>
      <div class="ps-item"><div class="ps-n n" id="s-na">0</div><div class="ps-l">Not Ans</div></div>
      <div class="ps-item"><div class="ps-n m" id="s-mk">0</div><div class="ps-l">Marked</div></div>
      <div class="ps-item"><div class="ps-n" id="s-nv">0</div><div class="ps-l">Not Vis</div></div>
    </div>
    <button class="pal-submit" onclick="closePalette();openSubmit();">✓ Submit Test</button>
  </div>
</div>
<div class="mo" id="mo">
  <div class="mb">
    <div class="mb-t">Submit Test?</div>

<script>
// ════ JEE MAIN SUBJECTS ════
// Pattern: 90 Qs · 3h · 300 marks
// Each subject: Section A (20 MCQ +4/-1) + Section B (10 Integer, attempt any 5, +4/0)
const SUBJS = [
  {name:'Physics',icon:'⚛️',color:'var(--sky)',cls:'qt-phy',
   secs:[
    {name:'Section A (MCQ)',type:'mcq',marks:'+4 / −1',qc:20},
    {name:'Section B (Integer)',type:'integer',marks:'+4 / 0',qc:10,attempt:5},
   ]},
  {name:'Chemistry',icon:'🧪',color:'var(--sage)',cls:'qt-chem',
   secs:[
    {name:'Section A (MCQ)',type:'mcq',marks:'+4 / −1',qc:20},
    {name:'Section B (Integer)',type:'integer',marks:'+4 / 0',qc:10,attempt:5},
   ]},
  {name:'Mathematics',icon:'📐',color:'var(--gold)',cls:'qt-math',
   secs:[
    {name:'Section A (MCQ)',type:'mcq',marks:'+4 / −1',qc:20},
    {name:'Section B (Integer)',type:'integer',marks:'+4 / 0',qc:10,attempt:5},
   ]},
];

const QS = [
  // ═══ PHYSICS · SECTION A (MCQ) ═══
  {s:0,sc:0,id:1,type:'mcq',
   text:'A body moves along a circular path of radius R with uniform speed v. The change in velocity when it describes an angle of 60° at the centre is:',
   opts:['v','v√2','v√3','2v'],ans:0,
   hint:'Change in velocity = 2v·sin(θ/2) = 2v·sin(30°) = 2v×0.5 = v'},
  {s:0,sc:0,id:2,type:'mcq',
   text:'The work done by a force F⃗ = (3î + 4ĵ) N in displacing a body through d⃗ = (2î − 3ĵ) m is:',
   opts:['6 J','−6 J','18 J','−18 J'],ans:1,
   hint:'W = F⃗·d⃗ = (3×2) + (4×−3) = 6 − 12 = −6 J'},
  {s:0,sc:0,id:3,type:'mcq',
   text:'In Young\'s double slit experiment, slit separation d = 0.2 mm, screen distance D = 1 m. If λ = 500 nm, fringe width is:',
   opts:['2.5 mm','1.5 mm','0.5 mm','5 mm'],ans:0,
   hint:'β = λD/d = (500×10⁻⁹×1)/(0.2×10⁻³) = 2.5×10⁻³ m = 2.5 mm'},
  {s:0,sc:0,id:4,type:'mcq',
   text:'A monoatomic ideal gas undergoes adiabatic expansion. If volume becomes 8 times, the temperature becomes:',
   opts:['T/4','T/2','T/8','2T'],ans:0,
   hint:'For adiabatic process: TV^(γ-1) = const. For monoatomic γ=5/3, T₁V₁^(2/3) = T₂(8V₁)^(2/3). T₂ = T₁/4'},
  {s:0,sc:0,id:5,type:'mcq',
   text:'The magnetic field at the centre of a circular coil of radius R carrying current I is:',
   opts:['μ₀I/2R','μ₀I/R','2μ₀I/R','μ₀I/4R'],ans:0,
   hint:'B = μ₀I/2R (standard result for magnetic field at centre of circular current loop)'},
  {s:0,sc:0,id:6,type:'mcq',
   text:'For a photoelectric effect experiment, the stopping potential depends on:',
   opts:['Intensity of light only','Frequency of light only','Both frequency and intensity','Neither frequency nor intensity'],ans:1,
   hint:'Stopping potential V₀ = (hν − φ)/e. It depends only on frequency (ν) and work function (φ), NOT intensity.'},
  {s:0,sc:0,id:7,type:'mcq',
   text:'A convex mirror of focal length 20 cm forms an image of an object placed at 30 cm. The image distance is:',
   opts:['12 cm behind mirror','12 cm in front','60 cm behind','60 cm in front'],ans:0,
   hint:'1/v + 1/u = 1/f. For convex mirror f=+20, u=−30. 1/v = 1/20 + 1/30 = (3+2)/60 = 5/60. v = +12 cm (behind mirror)'},
  {s:0,sc:0,id:8,type:'mcq',
   text:'The half-life of a radioactive element is 8 years. In 32 years, the fraction of element that remains is:',
   opts:['1/16','1/8','1/32','1/4'],ans:0,
   hint:'Number of half-lives = 32/8 = 4. Fraction remaining = (1/2)⁴ = 1/16'},
  {s:0,sc:0,id:9,type:'mcq',
   text:'In a series LCR circuit, resonance frequency is f₀. If both L and C are doubled, new resonance frequency is:',
   opts:['f₀/2','f₀/4','2f₀','f₀'],ans:0,
   hint:'f₀ = 1/(2π√LC). If L→2L, C→2C: new f = 1/(2π√(2L×2C)) = 1/(2π×2√LC) = f₀/2'},
  {s:0,sc:0,id:10,type:'mcq',
   text:'Two charges +q and −q are placed at distance d. The electric field at the midpoint between them is:',
   opts:['Zero','8kq/d²','4kq/d²','kq/d²'],ans:1,
   hint:'At midpoint, E from +q points towards −q, E from −q also points towards −q. E_net = 2×k·q/(d/2)² = 8kq/d²'},
  {s:0,sc:0,id:11,type:'mcq',
   text:'The escape velocity from Earth\'s surface is approximately:',
   opts:['7.9 km/s','11.2 km/s','3.0 km/s','9.8 km/s'],ans:1,
   hint:'Escape velocity v_e = √(2GM/R) = √(2gR) = √(2×9.8×6.4×10⁶) ≈ 11.2 km/s'},
  {s:0,sc:0,id:12,type:'mcq',
   text:'A wire of resistance R is bent into a circle. The effective resistance between two diametrically opposite points is:',
   opts:['R/4','R/2','R','2R'],ans:0,
   hint:'Two semicircles of resistance R/2 each in parallel. R_eff = (R/2 × R/2)/(R/2 + R/2) = R/4'},
  {s:0,sc:0,id:13,type:'mcq',
   text:'The dimensional formula of Planck\'s constant (h) is:',
   opts:['[ML²T⁻¹]','[ML²T⁻²]','[MLT⁻¹]','[ML²T⁻³]'],ans:0,
   hint:'E = hν. [h] = [E]/[ν] = ML²T⁻²/T⁻¹ = ML²T⁻¹ (same as angular momentum)'},
  {s:0,sc:0,id:14,type:'mcq',
   text:'The Bernoulli equation is based on the conservation of:',
   opts:['Mass','Momentum','Energy','All of the above'],ans:2,
   hint:'Bernoulli\'s equation (P + ½ρv² + ρgh = constant) is based on conservation of mechanical energy for ideal fluid flow.'},
  {s:0,sc:0,id:15,type:'mcq',
   text:'A body is thrown horizontally with velocity u from height h. Time to reach ground is:',
   opts:['√(h/g)','√(2h/g)','2h/g','h/g'],ans:1,
   hint:'Vertical: h = ½gt². t = √(2h/g). Horizontal velocity doesn\'t affect vertical fall time.'},
  {s:0,sc:0,id:16,type:'mcq',
   text:'In a p-n junction diode under forward bias:',
   opts:['Depletion region widens','Depletion region narrows','Current flows from n to p internally','Reverse current flows'],ans:1,
   hint:'Forward bias reduces the potential barrier, narrowing the depletion region and allowing current to flow.'},
  {s:0,sc:0,id:17,type:'mcq',
   text:'The coefficient of performance (COP) of a refrigerator is:',
   opts:['Q_L/W','Q_H/W','W/Q_L','Q_H/Q_L'],ans:0,
   hint:'COP of refrigerator = Q_L/W = Heat removed from cold reservoir / Work input.'},
  {s:0,sc:0,id:18,type:'mcq',
   text:'If the frequency of sound is doubled, the wavelength becomes:',
   opts:['Half','Double','Quarter','Same'],ans:0,
   hint:'v = fλ. Speed of sound is constant. If f doubles, λ = v/f becomes half.'},
  {s:0,sc:0,id:19,type:'mcq',
   text:'The SI unit of electric field intensity is:',
   opts:['N/C','C/N','N·C','V·m'],ans:0,
   hint:'Electric field E = F/q. SI unit = Newton/Coulomb (N/C) = Volt/metre (V/m).'},
  {s:0,sc:0,id:20,type:'mcq',
   text:'A proton and alpha particle are accelerated through same potential difference. Ratio of their de Broglie wavelengths λ_p/λ_α is:',
   opts:['2√2','√2','1/√2','2'],ans:0,
   hint:'λ = h/√(2mqV). λ_p/λ_α = √(m_α×q_α×V)/√(m_p×q_p×V) = √(4m_p×2e)/√(m_p×e) = √8 = 2√2'},

  // ═══ PHYSICS · SECTION B (INTEGER) ═══
  {s:0,sc:1,id:21,type:'integer',
   text:'A ball is thrown vertically upward with speed 20 m/s. The maximum height (in metres) reached by the ball is: (g = 10 m/s²)',
   ans:'20',hint:'h = v²/2g = 400/20 = 20 m'},
  {s:0,sc:1,id:22,type:'integer',
   text:'In a series circuit R = 10Ω, X_L = 20Ω, X_C = 14Ω. The impedance Z (in Ω) is (nearest integer):',
   ans:'12',hint:'Z = √(R² + (X_L − X_C)²) = √(100 + 36) = √136 ≈ 12 Ω'},
  {s:0,sc:1,id:23,type:'integer',
   text:'Two parallel plates capacitor has plate area 100 cm² and separation 1 mm. Capacitance (in pF) is: (ε₀ = 8.85×10⁻¹² F/m)',
   ans:'89',hint:'C = ε₀A/d = 8.85×10⁻¹²×100×10⁻⁴/10⁻³ ≈ 88.5 pF ≈ 89 pF'},
  {s:0,sc:1,id:24,type:'integer',
   text:'The wavelength (in nm) of photon with energy 2.5 eV is: (hc = 1240 eV·nm)',
   ans:'496',hint:'λ = hc/E = 1240/2.5 = 496 nm'},
  {s:0,sc:1,id:25,type:'integer',
   text:'A particle completes 5 revolutions per second in a circle of radius 2 m. Its centripetal acceleration (in m/s²) is approximately:',
   ans:'1974',hint:'a = ω²r = (2πf)²r = (10π)²×2 = 200π² ≈ 1974 m/s²'},
  {s:0,sc:1,id:26,type:'integer',text:'The power of a lens that forms a real image at 40 cm of an object at 20 cm is (in dioptres):',ans:'7',hint:'1/f = 1/v − 1/u = 1/0.4 − 1/(−0.2) = 2.5+5 = 7.5 D ≈ 7 D'},
  {s:0,sc:1,id:27,type:'integer',text:'An object of mass 2 kg is thrown upward. At the highest point, its KE is (in J):',ans:'0',hint:'At highest point, velocity = 0, so KE = ½mv² = 0 J'},
  {s:0,sc:1,id:28,type:'integer',text:'The number of significant figures in 0.00340 is:',ans:'3',hint:'Leading zeros are not significant. Trailing zero after decimal IS significant. 3, 4, 0 → 3 significant figures.'},
  {s:0,sc:1,id:29,type:'integer',text:'The gravitational PE of a satellite at height R above Earth surface (m=1 kg, g=10 m/s², R=6400 km) in MJ is approximately:',ans:'32',hint:'At h=R: PE = −GMm/2R = −mgR/2 = −10×6.4×10⁶/2 = −32 MJ (magnitude = 32 MJ)'},
  {s:0,sc:1,id:30,type:'integer',text:'In photoelectric effect, the stopping potential for light of frequency 2×10¹⁵ Hz is (φ = 4 eV, h = 4×10⁻¹⁵ eV·s):',ans:'4',hint:'V₀ = (hf − φ)/e = (4×10⁻¹⁵ × 2×10¹⁵ − 4)/1 = (8−4) = 4 V'},

  // ═══ CHEMISTRY · SECTION A ═══
  {s:1,sc:0,id:31,type:'mcq',
   text:'The hybridisation of carbon in diamond and graphite respectively is:',
   opts:['sp³, sp²','sp², sp³','sp³, sp','sp, sp²'],ans:0,
   hint:'In diamond: each C bonded to 4 others tetrahedral → sp³. In graphite: each C bonded to 3 in layer → sp², one π bond.'},
  {s:1,sc:0,id:32,type:'mcq',
   text:'The reaction of CH₃CHO with HCN gives a product which on hydrolysis yields:',
   opts:['Glycolic acid','Lactic acid','Acetic acid','Pyruvic acid'],ans:1,
   hint:'CH₃CHO + HCN → CH₃CH(OH)CN (cyanohydrin) → hydrolysis → CH₃CH(OH)COOH (lactic acid)'},
  {s:1,sc:0,id:33,type:'mcq',
   text:'Which of the following has the highest boiling point?',
   opts:['n-butane','Isobutane','n-pentane','Neopentane'],ans:2,
   hint:'Higher molecular weight and linear structure → more surface area → stronger van der Waals forces → highest bp for n-pentane.'},
  {s:1,sc:0,id:34,type:'mcq',
   text:'The molarity of a 10% w/v H₂SO₄ solution (density = 1.07 g/mL) is approximately:',
   opts:['1.09 M','1.07 M','0.98 M','1.15 M'],ans:0,
   hint:'10% w/v means 10g H₂SO₄ in 100 mL solution. Molarity = 10/(98 × 0.1) = 1.02 M ≈ 1.09 M'},
  {s:1,sc:0,id:35,type:'mcq',
   text:'Which of the following oxides is amphoteric?',
   opts:['Na₂O','MgO','Al₂O₃','P₂O₅'],ans:2,
   hint:'Al₂O₃ reacts with both acids (→ AlCl₃) and bases (→ NaAlO₂). This dual behavior = amphoteric oxide.'},
  {s:1,sc:0,id:36,type:'mcq',
   text:'The IUPAC name of CH₂=CH−CH₂−OH is:',
   opts:['Prop-1-en-3-ol','Prop-2-en-1-ol','Prop-1-en-1-ol','Allyl alcohol only'],ans:1,
   hint:'OH on C1, double bond between C2 and C3 → prop-2-en-1-ol (also called allyl alcohol).'},
  {s:1,sc:0,id:37,type:'mcq',
   text:'Assertion: NaCl has higher melting point than CCl₄.\nReason: NaCl is ionic while CCl₄ is covalent (molecular).',
   opts:['Both A and R are true and R explains A','Both are true but R doesn\'t explain A','A is true but R is false','A is false'],ans:0,
   hint:'Ionic compounds (NaCl) have strong electrostatic forces → very high mp. Molecular CCl₄ has weak van der Waals forces → low mp.'},
  {s:1,sc:0,id:38,type:'mcq',
   text:'The number of sigma bonds in CH₂=C=CH₂ (allene) is:',
   opts:['4','5','6','7'],ans:2,
   hint:'Allene: C−H(×4 sigma) + C=C(×2 sigma, 2 pi) = 4 C-H + 2 C-C sigma = 6 sigma bonds.'},
  {s:1,sc:0,id:39,type:'mcq',
   text:'Which reagent is used to distinguish between primary, secondary and tertiary alcohols?',
   opts:['Na metal','Lucas reagent (anhydrous ZnCl₂ + conc. HCl)','KMnO₄','Fehling\'s solution'],ans:1,
   hint:'Lucas reagent reacts at different rates: 3° (immediate turbidity), 2° (5 min), 1° (no reaction at room temp).'},
  {s:1,sc:0,id:40,type:'mcq',
   text:'The standard electrode potential E° for F₂/F⁻ is +2.87 V. This means fluorine is the:',
   opts:['Strongest reducing agent','Strongest oxidizing agent','Weakest oxidizing agent','Neutral'],ans:1,
   hint:'High positive E° means strong tendency to get reduced (gain electrons). F₂ is the strongest oxidizing agent known.'},
  {s:1,sc:0,id:41,type:'mcq',text:'The coordination number of Na⁺ in NaCl crystal is:',opts:['4','6','8','12'],ans:1,hint:'In NaCl (rock salt) structure: each Na⁺ is surrounded by 6 Cl⁻ ions and vice versa. Coordination number = 6.'},
  {s:1,sc:0,id:42,type:'mcq',text:'Which of the following is NOT a greenhouse gas?',opts:['CO₂','CH₄','N₂','N₂O'],ans:2,hint:'N₂ is NOT a greenhouse gas. CO₂, CH₄, N₂O and water vapor are major greenhouse gases.'},
  {s:1,sc:0,id:43,type:'mcq',text:'The reaction of sodium with ethanol gives:',opts:['NaOH + H₂','Sodium ethoxide + H₂','Sodium acetate + H₂','No reaction'],ans:1,hint:'2Na + 2C₂H₅OH → 2C₂H₅ONa + H₂↑. Sodium displaces H from −OH group of alcohols.'},
  {s:1,sc:0,id:44,type:'mcq',text:'The pH of 0.001 M HCl solution is:',opts:['1','2','3','4'],ans:2,hint:'HCl is strong acid, fully ionized. [H⁺] = 0.001 = 10⁻³ M. pH = −log[H⁺] = −log(10⁻³) = 3'},
  {s:1,sc:0,id:45,type:'mcq',text:'Which type of isomerism is shown by CH₃CH₂OH and CH₃OCH₃?',opts:['Chain isomerism','Position isomerism','Functional group isomerism','Optical isomerism'],ans:2,hint:'Both have formula C₂H₆O but different functional groups (alcohol vs ether) → functional group isomerism.'},
  {s:1,sc:0,id:46,type:'mcq',text:'Bohr\'s model explains the spectrum of:',opts:['Multi-electron atoms','Hydrogen atom only','All atoms','Noble gases'],ans:1,hint:'Bohr\'s model successfully explains the spectrum of hydrogen atom (and H-like ions). It fails for multi-electron systems.'},
  {s:1,sc:0,id:47,type:'mcq',text:'The catalyst used in the Haber process for manufacture of NH₃ is:',opts:['Pt','Fe with Mo promoter','V₂O₅','Ni'],ans:1,hint:'Haber process: N₂ + 3H₂ ⇌ 2NH₃. Catalyst = Iron (Fe) with molybdenum (Mo) as promoter. Conditions: 200 atm, 500°C.'},
  {s:1,sc:0,id:48,type:'mcq',text:'In an FCC unit cell, number of atoms per unit cell is:',opts:['2','4','6','8'],ans:1,hint:'FCC: 8 corner atoms (×1/8) + 6 face atoms (×1/2) = 1 + 3 = 4 atoms per unit cell.'},
  {s:1,sc:0,id:49,type:'mcq',text:'Which of the following best explains the Tyndall effect?',opts:['Reflection of light','Scattering of light by colloidal particles','Absorption of light','Refraction of light'],ans:1,hint:'Tyndall effect is the scattering of light by colloidal particles. This distinguishes colloids from true solutions.'},

// ════ STATE ════
const TOTAL_TIME = 3*3600;
let timeLeft = TOTAL_TIME;
let curS = 0, curSc = 0, curQ = 0;
const QST = {};
QS.forEach(q=>{ QST[q.id]={visited:false,answered:false,marked:false,answer:null}; });

function getQs(s,sc){ return QS.filter(q=>q.s===s&&q.sc===sc); }
function getCurQ(){ return getQs(curS,curSc)[curQ]||null; }
function gn(si,sci,qi){
  let n=1;
  for(let s=0;s<si;s++) n+=SUBJS[s].secs.reduce((a,b)=>a+b.qc,0);
  for(let sc=0;sc<sci;sc++) n+=SUBJS[si].secs[sc].qc;
  return n+qi;
}
function gi(){ return gn(curS,curSc,curQ); }

function renderSecTabs(){
  const tabs=document.getElementById('sec-tabs');
  tabs.innerHTML=SUBJS[curS].secs.map((s,i)=>`<button class="stab ${i===curSc?'on':''}" onclick="switchSec(${i})">${s.name}</button>`).join('');
  const qs=getQs(curS,curSc);
  document.getElementById('sec-info').textContent=`Q ${curQ+1} of ${qs.length}`;
}

function renderQ(){
  const q=getCurQ(); if(!q)return;
  const st=QST[q.id]; st.visited=true;
  const subj=SUBJS[q.s]; const sec=subj.secs[q.sc];
  const answered=QS.filter(qq=>QST[qq.id].answered).length;
  document.getElementById('qpf').style.width=`${(answered/90)*100}%`;
  document.getElementById('qcnt').textContent=`Q${gi()} / 90`;
  document.getElementById('sec-info').textContent=`Q ${curQ+1} of ${getQs(curS,curSc).length}`;
  const mb=document.getElementById('mbtn');
  mb.classList.toggle('marked',st.marked);
  mb.textContent=st.marked?'🔖 Marked':'🔖 Mark for Review';

  const isInt=q.type==='integer';
  const typeHtml=isInt
    ?`<span class="q-type-b qt-integer">Integer Type</span><div class="q-marks"><span class="mp">+4 correct</span><span class="mn">0 wrong</span></div>`
    :`<span class="q-type-b qt-single">Single Correct</span><div class="q-marks"><span class="mp">+4 correct</span><span class="mn">−1 wrong</span></div>`;

  let contentHtml='';
  if(isInt){
    contentHtml=`<div class="int-wrap">
      <div class="int-lbl">Enter your answer (integer value, can be negative):</div>
      <input type="text" inputmode="decimal" class="int-input" id="ii" value="${st.answer||''}" placeholder="0" oninput="saveInt(this.value)">
      <div class="calc-pad">
        ${[7,8,9,4,5,6,1,2,3].map(n=>`<button class="calc-btn" onclick="addDigit('${n}')">${n}</button>`).join('')}
        <button class="calc-btn" onclick="addDigit('0')">0</button>
        <button class="calc-btn" onclick="addDigit('.')">.</button>
        <button class="calc-btn neg" onclick="addDigit('neg')">±</button>
        <button class="calc-btn sp" onclick="clearInt()">✕</button>
      </div>
      ${sec.attempt?`<div style="font-size:.72rem;color:var(--amber);background:var(--amber-light);border:1px solid rgba(184,115,51,.2);border-radius:8px;padding:8px 12px;margin-top:8px;">ℹ️ Section B: Attempt any <strong>${sec.attempt}</strong> out of ${sec.qc} questions. Best ${sec.attempt} will be considered.</div>`:''}
    </div>`;
  } else {
    contentHtml=`<div class="q-opts">
      ${q.opts.map((o,i)=>`
      <div class="opt ${st.answer===i?'on':''}" onclick="selOpt(${i})">
        <div class="ok">${['A','B','C','D'][i]}</div>
        <div class="ot">${o}</div>
      </div>`).join('')}
    </div>`;
  }

  document.getElementById('qbody').innerHTML=`
  <div class="q-hdr">
    <div class="q-num-b">
      <div class="q-num">Q${gi()}</div>
      <div>${typeHtml}</div>
    </div>
    <div class="q-acts">
      <button class="q-ab ${st.marked?'bm':''}" onclick="toggleMark()" title="Mark">🔖</button>
      <button class="q-ab" onclick="alert('Hint: ${(q.hint||'Think carefully!').replace(/'/g,"\\'")}')">💡</button>
      <button class="q-ab" onclick="alert('Reported!')">⚑</button>
    </div>
  </div>
  <div class="q-tb">
    <div class="q-stag ${subj.cls}">${subj.icon} ${subj.name} · ${sec.name}</div>
    <div class="q-txt">${q.text}</div>
  </div>
  ${contentHtml}`;

  renderPalette(); updateSum();
}

function selOpt(i){
  const q=getCurQ(); if(!q)return;
  QST[q.id].answer=i; QST[q.id].answered=true;
  renderQ();
}

function saveInt(v){
  const q=getCurQ(); if(!q)return;
  QST[q.id].answer=v; QST[q.id].answered=v!==''&&v!==null;
  updateSum(); renderPalette();
}

function addDigit(d){
  var el=document.getElementById('ii'); if(!el)return;
  var v=el.value||'';
  if(d==='neg'){v=v.startsWith('-')?v.slice(1):(v?'-'+v:'-');}
  else if(d==='.'){if(!v.includes('.'))v+='.';}
  else if(d==='bs'){v=v.slice(0,-1);}
  else if(d==='clr'){v='';}
  else{v+=d;}
  el.value=v; saveInt(v);
}

function toggleNeg(){
  const el=document.getElementById('ii'); if(!el)return;
  el.value=el.value.startsWith('-')?el.value.slice(1):'-'+el.value;
  saveInt(el.value);
}

function clearInt(){
  const el=document.getElementById('ii');if(el){el.value='';saveInt('');}
}

function clearAns(){
  const q=getCurQ();if(!q)return;
  QST[q.id].answer=null;QST[q.id].answered=false;QST[q.id].marked=false;
  renderQ();
}

function toggleMark(){
  const q=getCurQ();if(!q)return;
  QST[q.id].marked=!QST[q.id].marked; renderQ();
}

function nav(d){
  const qs=getQs(curS,curSc);
  const ni=curQ+d;
  if(ni>=0&&ni<qs.length){curQ=ni;}
  else if(d>0){
    const secs=SUBJS[curS].secs;
    if(curSc<secs.length-1){curSc++;curQ=0;}
    else if(curS<SUBJS.length-1){curS++;curSc=0;curQ=0;updSubjTabs();}
  } else {
    if(curSc>0){curSc--;curQ=getQs(curS,curSc).length-1;}
    else if(curS>0){curS--;curSc=SUBJS[curS].secs.length-1;curQ=getQs(curS,curSc).length-1;updSubjTabs();}
  }
  renderSecTabs();renderQ();
}

function switchSubj(idx,el){
  curS=idx;curSc=0;curQ=0;updSubjTabs();renderSecTabs();renderQ();
}

function updSubjTabs(){
  document.querySelectorAll('.subj-tab').forEach((t,i)=>t.classList.toggle('active',i===curS));
}

function switchSec(idx){curSc=idx;curQ=0;renderSecTabs();renderQ();}
function jumpToQ(si,sci,qi){curS=si;curSc=sci;curQ=qi;updSubjTabs();renderSecTabs();renderQ();}

function renderPalette(){
  const pal=document.getElementById('palette');
  const q=getCurQ();
  let h='';
  SUBJS.forEach((subj,si)=>{
    h+=`<div class="pp-slbl">${subj.icon} ${subj.name}</div>`;
    subj.secs.forEach((sec,sci)=>{
      const qs=getQs(si,sci);if(!qs.length)return;
      h+=`<div style="font-size:.6rem;color:rgba(26,38,24,.35);margin-bottom:4px">${sec.name}${sec.attempt?` (attempt any ${sec.attempt})`:''}</div>`;
      h+='<div class="pp-grid">';
      qs.forEach((qq,qi)=>{
        const st=QST[qq.id];
        const isCur=qq.id===(q?q.id:0);
        let cls='pnv';
        if(st.answered&&st.marked)cls='pma';
        else if(st.answered)cls='pa';
        else if(st.marked)cls='pm';
        else if(st.visited)cls='pna';
        h+=`<button class="pb ${cls} ${isCur?'cur':''}" onclick="jumpToQ(${si},${sci},${qi})" title="Q${gn(si,sci,qi)}">${gn(si,sci,qi)}</button>`;
      });
      h+='</div>';
    });
  });
  pal.innerHTML=h;
}

function updateSum(){
  const ans=QS.filter(q=>QST[q.id].answered&&!QST[q.id].marked).length;
  const mA=QS.filter(q=>QST[q.id].marked&&QST[q.id].answered).length;
  const na=QS.filter(q=>QST[q.id].visited&&!QST[q.id].answered&&!QST[q.id].marked).length;
  const mk=QS.filter(q=>QST[q.id].marked&&!QST[q.id].answered).length;
  const nv=QS.filter(q=>!QST[q.id].visited).length;
  document.getElementById('s-ans').textContent=ans+mA;
  document.getElementById('s-na').textContent=na;
  document.getElementById('s-mk').textContent=mk;
  document.getElementById('s-nv').textContent=nv;
}

// Timer
function ft(s){
  const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}
const TI=setInterval(()=>{
  if(timeLeft<=0){clearInterval(TI);submitTest();return;}
  timeLeft--;
  document.getElementById('timer').textContent=ft(timeLeft);
  const b=document.getElementById('tbox');
  if(timeLeft<=300)b.className='timer-box danger';
  else if(timeLeft<=900)b.className='timer-box warning';
},1000);

function openMo(){
  const ans=QS.filter(q=>QST[q.id].answered).length;
  const na=QS.filter(q=>QST[q.id].visited&&!QST[q.id].answered).length;
  const mk=QS.filter(q=>QST[q.id].marked).length;
  const nv=QS.filter(q=>!QST[q.id].visited).length;
  document.getElementById('mo-time').textContent=ft(timeLeft);
  document.getElementById('mo-stats').innerHTML=`
  <div class="mb-si"><div class="mb-sn" style="color:var(--sage)">${ans}</div><div class="mb-sl">Answered</div></div>
  <div class="mb-si"><div class="mb-sn" style="color:var(--rose)">${na}</div><div class="mb-sl">Not Answered</div></div>
  <div class="mb-si"><div class="mb-sn" style="color:var(--gold)">${mk}</div><div class="mb-sl">Marked</div></div>
  <div class="mb-si"><div class="mb-sn" style="color:rgba(26,38,24,.35)">${nv}</div><div class="mb-sl">Not Visited</div></div>`;
  document.getElementById('mo-warn').innerHTML=nv>0
    ?`⚠️ <strong>${nv} questions not visited.</strong> Don't forget Section B — attempt any 5!`
    :`✅ All 90 questions attempted!`;
  document.getElementById('mo').classList.add('open');
}
function closeMo(){document.getElementById('mo').classList.remove('open');}
document.getElementById('mo').addEventListener('click',e=>{if(e.target===document.getElementById('mo'))closeMo();});

function submitTest(){
  clearInterval(TI); closeMo();
  let score=0,correct=0,wrong=0,skipped=0;
  QS.forEach(q=>{
    const st=QST[q.id];
    if(!st.answered){skipped++;return;}
    const myAns=q.type==='integer'?String(st.answer).trim():st.answer;
    const corrAns=q.type==='integer'?String(q.ans):q.ans;
    if(myAns==corrAns){score+=4;correct++;}
    else if(q.type==='mcq'){score-=1;wrong++;}
    else skipped++;
  });
  const tt=TOTAL_TIME-timeLeft;
  const th=Math.floor(tt/3600),tm=Math.floor((tt%3600)/60);
  const pct=Math.round(score/300*100);

  document.getElementById('ti').style.display='none';
  const rv=document.getElementById('rv');
