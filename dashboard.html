<!DOCTYPE html>
<html>
<head>
  <title>Dashboard - MockArena</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0d0d0d;
      color: white;
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      padding: 15px 30px;
      background: black;
    }

    .logo {
      font-size: 22px;
      font-weight: bold;
    }

    .logo span {
      color: orange;
    }

    .container {
      padding: 20px;
    }

    .cards {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .card {
      background: #1a1a1a;
      padding: 20px;
      border-radius: 10px;
      width: 250px;
    }

    h2 {
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

  <div class="navbar">
    <div class="logo">Mock<span>Arena</span></div>
    <div>Dashboard</div>
  </div>

  <div class="container">
    <h1>Your Performance</h1>

    <div class="cards">
      <div class="card">
        <h2>Physics</h2>
        <p>Score: 72%</p>
      </div>

      <div class="card">
        <h2>Chemistry</h2>
        <p>Score: 65%</p>
      </div>

      <div class="card">
        <h2>Mathematics</h2>
        <p>Score: 80%</p>
      </div>
    </div>
  </div>

</body>
</html>
