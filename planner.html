<!DOCTYPE html>
<html>
<head>
<title>Study Planner - MockArena</title>
<style>
body {
    font-family: Arial;
    background: #0d0d0d;
    color: white;
    padding: 20px;
}

input, button {
    padding: 8px;
    margin: 5px;
}

.task {
    background: #1a1a1a;
    padding: 10px;
    margin: 5px;
    border-radius: 5px;
}
</style>
</head>

<body>

<h1>Study Planner</h1>

<input type="text" id="taskInput" placeholder="Enter study task">
<button onclick="addTask()">Add Task</button>

<h3>Your Tasks:</h3>
<div id="taskList"></div>

<script>
function loadTasks() {
    let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
    let list = "";

    tasks.forEach((task, index) => {
        list += "<div class='task'>" +
                task +
                " <button onclick='deleteTask(" + index + ")'>Done</button>" +
                "</div>";
    });

    document.getElementById("taskList").innerHTML = list;
}

function addTask() {
    let task = document.getElementById("taskInput").value;

    if(task === "") return;

    let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
    tasks.push(task);

    localStorage.setItem("tasks", JSON.stringify(tasks));
    document.getElementById("taskInput").value = "";
    loadTasks();
}

function deleteTask(index) {
    let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
    tasks.splice(index, 1);

    localStorage.setItem("tasks", JSON.stringify(tasks));
    loadTasks();
}

window.onload = loadTasks;
</script>

</body>
</html>
