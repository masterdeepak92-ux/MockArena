<!DOCTYPE html><html>
<head>
<title>MockArena</title>
<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0d0d0d;
  color: white;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
.navbar a {
  color: white;
  text-decoration: none;
  margin-left: 20px;
  font-size: 16px;
}

.navbar a:hover {
  color: orange;
}

.logo {
font-size: 24px;
font-weight: bold;
}

.logo span {
color: orange;
}

.hero {
  text-align: center;
  padding: 80px 20px;
  flex: 1;
}

.hero span {
color: orange;
}

.btn {
padding: 12px 25px;
background: orange;
border: none;
border-radius: 5px;
}

.features {
display: flex;
justify-content: space-around;
padding: 40px;
flex-wrap: wrap;
}

.card {
background: #1a1a1a;
padding: 20px;
width: 250px;
margin: 10px;
border-radius: 10px;
}

.footer {
text-align: center;
padding: 20px;
background: black;
}
</style>

</head><body><div class="navbar">
  <div class="logo">Mock<span>Arena</span></div>
  <div>
    <a href="#">Home</a>
    <a href="#">Tests</a>
    <a href="login.html">Login</a>
  </div>
</div><div class="hero">
  <h1>Welcome to <span>MockArena</span></h1>
  <p>Your Practice Arena for Success 🚀</p>
  <div style="margin-bottom:10px;">
    <input type="text" id="username" placeholder="Enter Your Name">
    <button onclick="saveName()">Save Name</button>
</div>
  <button class="btn">Start Practicing</button>
</div><div class="features">
  <div class="card">
    <h3>Performance Tracking</h3>
    <p>Track your progress</p>
  </div>
  <div class="card">
    <h3>Mock Tests</h3>
    <p>Practice exams</p>
  </div>
  <div class="card">
    <h3>Smart Analysis</h3>
    <p>Improve performance</p>
  </div>
</div><div class="footer">
  <p>© 2026 MockArena</p>
</div>
  <script>
function saveName() {
    let name = document.getElementById("username").value;

    if(name == ""){
        alert("Please enter your name");
        return;
    }

    localStorage.setItem("mockUser", name);
    alert("Name saved successfully!");
}
</script>
</body></html>
